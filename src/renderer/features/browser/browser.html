                            <button className="ane-shortcut ane-shortcut--add" onClick={handleAddShortcut}>
                                <div className="ane-shortcut__tile">
                                    <Icons.Plus />
                                </div>
                                <p className="ane-shortcut__label">{t('Add', language)}</p>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // silent mode module

        const MuteModeModule = ({ isOpen, onClose, language }) => {
            // 狀態管理：'warning' (警告) -> 'timer' (設定時間) -> 'active' (鎖定中)
            const [step, setStep] = useState('warning');

            // 將時間拆分為「分」與「秒」
            const [minutes, setMinutes] = useState(0);
            const [seconds, setSeconds] = useState(0);

            const [timeLeft, setTimeLeft] = useState(0);
            const intervalRef = useRef(null);

            // 每次開啟時重置狀態
            useEffect(() => {
                if (isOpen) {
                    setStep('warning');
                    setMinutes(0);
                    setSeconds(0);
                } else if (step === 'active') {
                    handleExit();
                }
            }, [isOpen]);

            const handleStartTimer = async () => {
                // 計算總秒數
                const totalSeconds = (minutes * 60) + seconds;
                if (totalSeconds <= 0) {
                    // 可以加入簡單的防呆，避免設定 0 分 0 秒
                    return;
                }

                setStep('active');
                setTimeLeft(totalSeconds);

                // 呼叫 Electron 鎖定電腦
                if (window.electronAPI && window.electronAPI.enterMuteMode) {
                    await window.electronAPI.enterMuteMode();
                }

                // 開始倒數
                intervalRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            handleExit();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const handleExit = async () => {
                clearInterval(intervalRef.current);
                setStep('warning');
                onClose();

                // 解除鎖定
                if (window.electronAPI && window.electronAPI.exitMuteMode) {
                    await window.electronAPI.exitMuteMode();
                }
                // 如果您有 showToast 函式，可以取消註解以下這行
                // showToast('靜音模式已結束', 'info');
            };

            const formatTime = (totalSecs) => {
                const m = Math.floor(totalSecs / 60);
                const s = totalSecs % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md animate-fade-in">
                    <div className="w-[400px] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden p-6 text-center">
                        {step === 'warning' && (
                            <>
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icons.Lock className="w-8 h-8" />
                                </div>
                                <h2 className="text-xl font-bold text-gray-800 mb-2">{t('Warning', language)}</h2>
                                <p className="text-gray-600 mb-6">{t('This mode will lock your computer, are you sure?', language)}</p>
                                <div className="flex gap-3">
                                    <button onClick={onClose} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition-colors">{t('Cancel', language)}</button>
                                    <button onClick={() => setStep('timer')} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">{t('Confirm', language)}</button>
                                </div>
                            </>
                        )}

                        {step === 'timer' && (
                            <>
                                <h2 className="text-xl font-bold text-gray-800 mb-4">{t('Set Mute Duration', language)}</h2>

                                <div className="mb-6 flex items-center justify-center gap-4">
                                    <div className="flex flex-col items-center">
                                        <input
                                            type="number"
                                            min="0" max="120"
                                            value={minutes}
                                            onChange={(e) => setMinutes(Math.max(0, Number(e.target.value)))}
                                            className="w-20 text-center text-3xl py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none mb-1"
                                        />
                                        <span className="text-gray-500 text-sm font-medium">{t('Minutes', language)}</span>
                                    </div>
                                    <span className="text-3xl font-bold text-gray-400 pb-5">:</span>
                                    <div className="flex flex-col items-center">
                                        <input
                                            type="number"
                                            min="0" max="59"
                                            value={seconds}
                                            onChange={(e) => setSeconds(Math.max(0, Math.min(59, Number(e.target.value))))}
                                            className="w-20 text-center text-3xl py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none mb-1"
                                        />
                                        <span className="text-gray-500 text-sm font-medium">{t('Seconds', language)}</span>
                                    </div>
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={onClose} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition-colors">{t('Cancel', language)}</button>
                                    <button onClick={handleStartTimer} className="flex-1 py-2.5 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">{t('Start Lock', language)}</button>
                                </div>
                            </>
                        )}

                        {step === 'active' && (
                            <div className="py-8">
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">{t('Mute Mode in Progress', language)}</h2>
                                <p className="text-gray-500 mb-8">{t('Please focus on your studies', language)}</p>
                                <div className="text-7xl font-mono text-red-600 font-bold mb-8 tracking-wider">
                                    {formatTime(timeLeft)}
                                </div>
                                <button onClick={handleExit} className="text-sm text-gray-400 hover:text-red-500 underline transition-colors">{t('Emergency Exit', language)}</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 4. Main App Layout
        const App = () => {
            // State
            const [tabs, setTabs] = useState([{ id: 'init-1', title: 'New Tab', url: '', isLoading: false, history: [''], historyIndex: 0, canGoBack: false, canGoForward: false }]);
            const [activeTabId, setActiveTabId] = useState('init-1');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [mode, setMode] = useState('daily');
            const [showSettings, setShowSettings] = useState(false);
            const [searchEngine, setSearchEngine] = useState('google');
            const [addressBarValue, setAddressBarValue] = useState('');
            const [activeModule, setActiveModule] = useState(null); // 'ai-assistant' | 'chatroom' | 'notes' | 'history' | 'bookmarks' | 'downloads' | 'pomodoro' | 'todo' | 'schedule' | 'weather' | 'mute' | null
            const [isBookmarked, setIsBookmarked] = useState(false);
            const webviewRefs = useRef({});
            const [webview, setWebview] = useState(null); // Webview state

            // === [新增] User State & Login Logic ===
            const [user, setUser] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [isLoginMode, setIsLoginMode] = useState(true); // 預設為 true (登入模式)
            const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '' });

            // === Theme Customization State ===
            const [themeSettings, setThemeSettings] = useState({ daily: '#c2410c', learning: '#1d4ed8' });

            // === [請在這裡補回遺失的 handleLogin] ===
            const handleLogin = () => {
                setShowLoginModal(true);
                setIsLoginMode(true); // 確保每次點擊都是打開「登入」模式
                setShowSettings(false); // 順便幫你加上這行，點擊登入後自動關閉設定選單，體驗更好
            };

            const handleThemeChange = (themeMode, color) => {
                setThemeSettings(prev => ({ ...prev, [themeMode]: color }));
            };

            const resetTheme = () => {
                setThemeSettings({ daily: '#c2410c', learning: '#1d4ed8' });
                showToast('Theme reset to default', 'success');
            };

            const handleClearBrowsingData = async () => {
                const confirmMessage = t('Are you sure you want to clear all user data? This will delete your history, bookmarks, and reset theme colors.', language);
                if (!window.confirm(confirmMessage)) {
                    return;
                }

                const errors = [];

                try {
                    if (window.anechoicAPI?.clearHistory) {
                        const result = await window.anechoicAPI.clearHistory();
                        if (!result?.ok) {
                            errors.push(result?.error || 'history');
                        }
                    }
                } catch (error) {
                    errors.push(error.message);
                }

                try {
                    localStorage.removeItem(getStorageKey('my_bookmarks'));
                    localStorage.removeItem(getStorageKey('anechoic_todos'));
                    localStorage.removeItem(getStorageKey('anechoic_schedule'));
                    localStorage.removeItem(getStorageKey('anechoic_chatroom_messages'));
                    localStorage.removeItem(getStorageKey('anechoic_shortcuts'));
                } catch (error) {
                    errors.push(error.message);
                }

                try {
                    if (window.electronAPI?.clearNotes) {
                        const noteResult = await window.electronAPI.clearNotes();
                        if (!noteResult?.ok) {
                            errors.push(noteResult?.error || 'notes');
                        }
                    }
                } catch (error) {
                    errors.push(error.message);
                }

                try {
                    if (window.electronAPI?.clearDownloads) {
                        await window.electronAPI.clearDownloads();
                    }
                } catch (error) {
                    errors.push(error.message);
                }

                setIsBookmarked(false);
                setActiveModule(null);
                setThemeSettings({ daily: '#c2410c', learning: '#1d4ed8' });

                if (errors.length === 0) {
                    showToast(t('All user data cleared', language), 'success');
                } else {
                    showToast(`${t('Failed to clear some data', language)}: ${errors.join(', ')}`, 'warning');
                }
            };

            const handleLogout = async () => {
                setUser(null);
                localStorage.removeItem('anechoic_user');
                // 通知 Electron 切換回訪客歷史記錄
                if (window.electronAPI && window.electronAPI.setCurrentUser) {
                    await window.electronAPI.setCurrentUser('guest');
                }
                // 重新載入頁面以清空畫面上的舊資料
                setTimeout(() => window.location.reload(), 500);
            };

            const submitFakeAuth = async (e) => {
                e.preventDefault();
                if (!authForm.username.trim() || !authForm.password.trim()) return;

                const username = authForm.username.trim();
                const password = authForm.password.trim();

                // 從 localStorage 讀取「假資料庫」
                const accounts = JSON.parse(localStorage.getItem('anechoic_accounts_db') || '[]');
                const existingUser = accounts.find(a => a.username === username);

                if (isLoginMode) {
                    // === 登入邏輯 ===
                    if (!existingUser || existingUser.password !== password) {
                        if (typeof showToast === 'function') showToast(t('Login failed: Invalid username or password', language) || '登入失敗：帳號或密碼錯誤', 'error');
                        return;
                    }
                } else {
                    // === 註冊邏輯 ===
                    if (password !== authForm.confirmPassword) {
                        if (typeof showToast === 'function') showToast(t('Passwords do not match!', language), 'error');
                        return;
                    }
                    if (existingUser) {
                        if (typeof showToast === 'function') showToast(t('Username already exists!', language) || '帳號已經存在！', 'error');
                        return;
                    }
                    // 儲存新帳號到假資料庫
                    accounts.push({ username, password });
                    localStorage.setItem('anechoic_accounts_db', JSON.stringify(accounts));
                }

                // 產生大頭貼與使用者物件
                const firstLetter = username.charAt(0).toUpperCase();
                const avatarSvg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%233B82F6"/><text x="50" y="50" font-family="sans-serif" font-size="50" font-weight="bold" fill="white" dominant-baseline="central" text-anchor="middle">${firstLetter}</text></svg>`;

                const fakeUser = {
                    id: "fake_" + Date.now(),
                    name: username,
                    avatar: avatarSvg
                };

                // 儲存當前登入狀態
                setUser(fakeUser);
                localStorage.setItem('anechoic_user', JSON.stringify(fakeUser));

                // [重要] 通知 Electron 後端切換使用者，載入該使用者的 History 和 Notes
                if (window.electronAPI && window.electronAPI.setCurrentUser) {
                    await window.electronAPI.setCurrentUser(username);
                }

                setShowLoginModal(false);
                setAuthForm({ username: '', password: '', confirmPassword: '' });

                if (typeof showToast === 'function') {
                    const msg = isLoginMode ? `${t('Welcome back, ', language)}${username}！` : `${t('Registration successful, welcome ', language)}${username}！`;
                    showToast(msg, 'success');
                }

                // 重新載入頁面，讓所有元件 (書籤、Todo) 讀取新使用者的專屬 Key
                setTimeout(() => window.location.reload(), 1000);
            };


            const [language, setLanguage] = useState(() => {
                return localStorage.getItem('anechoic_lang') || 'en';
            });

            const handleLanguageChange = (newLang) => {
                setLanguage(newLang);
                localStorage.setItem('anechoic_lang', newLang);
            };

            // === [新增結束] ===
            // Verify anechoicAPI on mount
            useEffect(() => {
                // 1. 檢查 anechoicAPI (保留原有檢查)
                if (window.anechoicAPI) {
                    console.log('✅ anechoicAPI is available');
                } else {
                    console.warn('⚠️ anechoicAPI is missing');
                }

                // 2. 讀取 LocalStorage 的舊登入紀錄
                const saved = localStorage.getItem('anechoic_user');
                if (saved) {
                    try { setUser(JSON.parse(saved)); } catch (e) { }
                }

                // 3. 監聽 Electron 登入成功事件 (Debug Log 版本)
                console.log('Checking electronAPI:', window.electronAPI);

                if (window.electronAPI && window.electronAPI.onLoginSuccess) {
                    console.log('👂 Listening for login success...');

                    window.electronAPI.onLoginSuccess((userData) => {
                        console.log('🎉 FRONTEND RECEIVED USER DATA:', userData);
                        setUser(userData);
                        localStorage.setItem('anechoic_user', JSON.stringify(userData));
                        setShowSettings(true); // 登入成功後自動彈出設定選單
                    });
                } else {
                    console.error('❌ electronAPI.onLoginSuccess is missing!');
                }

                if (window.electronAPI?.on) {
                    window.electronAPI.on('chatroom:open-in-app', () => {
                        setActiveModule('chatroom');
                    });
                }
            }, []);

            // 计算当前激活的 Tab
            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];
            const canGoBack = activeTab.canGoBack || false;
            const canGoForward = activeTab.canGoForward || false;

            // === 1. 书签逻辑 (必须放在 useEffect 之前) ===

            // 检查当前 URL 是否已收藏
            const checkBookmarkStatus = (currentUrl) => {
                if (!currentUrl) return false;
                try {
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    const bookmarks = saved ? JSON.parse(saved) : [];
                    return bookmarks.some(b => b.url === currentUrl);
                } catch (e) {
                    console.error("Failed to read bookmarks", e);
                    return false;
                }
            };

            // 切换收藏状态
            const toggleBookmark = () => {
                if (!activeTab.url) {
                    showToast('Cannot bookmark a blank page', 'warning');
                    return;
                }
                try {
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    let bookmarks = saved ? JSON.parse(saved) : [];
                    const currentUrl = activeTab.url;

                    const isExisting = bookmarks.some(b => b.url === currentUrl);

                    if (isExisting) {
                        bookmarks = bookmarks.filter(b => b.url !== currentUrl);
                        setIsBookmarked(false);
                        showToast('Removed from favorites', 'info');
                    } else {
                        bookmarks.push({
                            title: activeTab.title || 'No Title',
                            url: currentUrl,
                            timestamp: Date.now()
                        });
                        setIsBookmarked(true);
                        showToast('Added to favorites!', 'success');
                    }
                    localStorage.setItem(getStorageKey('my_bookmarks'), JSON.stringify(bookmarks));
                } catch (e) {
                    showToast('Operation failed: ' + e.message, 'error');
                }
            };

            // === 2. Effects (监听器) ===

            // 监听 URL 变化，更新书签按钮状态
            useEffect(() => {
                const status = checkBookmarkStatus(activeTab.url);
                setIsBookmarked(status);
            }, [activeTab.url, activeTabId]);

            // Verify anechoicAPI
            useEffect(() => {
                if (window.anechoicAPI) {
                    console.log('✅ anechoicAPI available');
                }
            }, []);

            // Listen for navigation requests from Vanilla JS (Smart Notes)
            useEffect(() => {
                const handleCustomNav = (e) => {
                    if (e.detail) {
                        navigate(e.detail);
                        setActiveModule(null); // Auto-close the notes panel
                    }
                };
                window.addEventListener('ANECHOIC_NAVIGATE', handleCustomNav);
                return () => window.removeEventListener('ANECHOIC_NAVIGATE', handleCustomNav);
            });

            // 侧边栏宽度通信
            const handleSidebarToggle = async (newOpenState) => {
                setSidebarOpen(newOpenState);
                const newWidth = newOpenState ? 256 : 64;
                if (window.electronAPI?.setSidebarWidth) {
                    await window.electronAPI.setSidebarWidth(newWidth);
                }
            };

            // 地址栏同步
            useEffect(() => {
                setAddressBarValue(activeTab.url);
            }, [activeTabId, activeTab.url]);

            // Webview Ref 更新
            useEffect(() => {
                const currentWebviewEl = webviewRefs.current[activeTabId];
                if (currentWebviewEl) {
                    setWebview(currentWebviewEl);
                }
            }, [activeTabId, tabs]);

            // Webview 事件监听
            useEffect(() => {
                if (!webview) return;

                const updateNavigationState = () => {
                    try {
                        updateTab(activeTabId, {
                            canGoBack: webview.canGoBack(),
                            canGoForward: webview.canGoForward(),
                            url: webview.getURL() || activeTab.url,
                            isLoading: false
                        });
                        setAddressBarValue(webview.getURL());
                    } catch (error) {
                        console.error(error);
                    }
                };

                const handleDomReady = () => updateNavigationState();
                const handleDidNavigate = (e) => updateNavigationState();
                const handleDidNavigateInPage = (e) => updateNavigationState();

                webview.addEventListener('dom-ready', handleDomReady);
                webview.addEventListener('did-navigate', handleDidNavigate);
                webview.addEventListener('did-navigate-in-page', handleDidNavigateInPage);

                return () => {
                    webview.removeEventListener('dom-ready', handleDomReady);
                    webview.removeEventListener('did-navigate', handleDidNavigate);
                    webview.removeEventListener('did-navigate-in-page', handleDidNavigateInPage);

            // === 3. 辅助函数 ===

            const addTab = () => {

            const updateTab = (id, updates) => {
                setTabs(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t));
            };

            const navigate = async (url) => {
                let targetUrl = url;
                if (!url || url.trim().length === 0) {
                    updateTab(activeTabId, { url: '', title: 'New Tab', isLoading: false });
                    setAddressBarValue('');
                    return;
                }
                if (!url.startsWith('http')) {

                    targetUrl = searchEngine === 'bing' ? `https://www.bing.com/search?q=${searchQuery}` :

                updateTab(activeTabId, { url: targetUrl, title: targetUrl, isLoading: true });
                setAddressBarValue(targetUrl);

            const goBack = () => webview?.canGoBack() && webview.goBack();
            const goForward = () => webview?.canGoForward() && webview.goForward();
            const reload = () => webview?.reload();
            const goHome = () => navigate('');
            const handleAddressBarSubmit = (e) => { e.preventDefault(); navigate(addressBarValue); };

            // === Auto-Capture Logic for Smart Notes ===
            const handleWebviewMount = (el) => {
                if (!el) return;

                // PREVENT DUPLICATE LISTENERS
                if (el.dataset.notesListenerAttached) return;
                el.dataset.notesListenerAttached = 'true';

                // Attach dom-ready listener
                const onDomReady = () => {
                    try {
                        console.log("🔥 注入复制监听脚本成功!");
                        el.executeJavaScript(`
                            document.addEventListener('copy', () => {
                                const selection = document.getSelection().toString();
                                if (selection) {
                                    console.log('ANECHOIC_COPY_EVENT::' + selection);
                                }
                            });
                        `);
                    } catch (err) {
                        console.error("Injection failed", err);
                    }
                };

                // ONLY rely on the event listener. NEVER call webview methods synchronously here.
                el.addEventListener('dom-ready', onDomReady);

                // Listen for console messages
                el.addEventListener('console-message', async (e) => {
                    if (e.message && e.message.startsWith('ANECHOIC_COPY_EVENT::')) {
                        const text = e.message.replace('ANECHOIC_COPY_EVENT::', '');
                        const url = el.getURL(); // Safe here because console-message implies it's loaded

                        console.log("🔥 [STEP 1] 成功拦截 Webview 复制事件!");
                        console.log("   -> URL:", url);
                        console.log("   -> Text Length:", text.length);

                        if (typeof window.notesAutoSave === 'function') {
                            console.log("🔥 [STEP 2] 呼叫 window.notesAutoSave...");
                            const saved = await window.notesAutoSave(text, url);
                            console.log("🔥 [STEP 4] notesAutoSave 回傳結果:", saved);
                            if (saved) {
                                showToast('Smart Note Saved!', 'success');
                            }
                        } else {
                            console.error("❌ 錯誤：找不到 window.notesAutoSave 函數！");
                        }
                    }
                });
            };

            // === 4. Render (渲染) ===
            return (
                <div className="ane-shell">
                    {/* Left Sidebar */}
                    <Sidebar
                        isOpen={sidebarOpen}
                        toggle={() => handleSidebarToggle(!sidebarOpen)}
                        mode={mode}
                        setMode={setMode}
                        onOpenModule={setActiveModule}
                        language={language}
                    />

                    {/* Main Content Area */}
                    <div className="ane-content-shell">
                        {/* Tabs Bar */}
                        <div className="ane-tabsbar draggable">
                            <div className="ane-tabrail no-scrollbar">
                                {tabs.map(tab => (
                                    <div key={tab.id} onClick={() => setActiveTabId(tab.id)} className={`ane-tab ${activeTabId === tab.id ? 'is-active' : ''}`}>
                                        {activeTabId === tab.id && (
                                            <svg className="ane-tab__active-shape" viewBox="0 0 120 34" preserveAspectRatio="none" aria-hidden="true">
                                                <path className="ane-tab__active-fill" d="M0,34 L0,8 Q0,0 8,0 L112,0 Q120,0 120,8 L120,34 Z" />
                                                <path className="ane-tab__active-stroke" d="M0,34 L0,8 Q0,0 8,0 L112,0 Q120,0 120,8 L120,34" />
                                            </svg>
                                        )}
                                        <span className="ane-tab__title">{tab.title}</span>
                                        <button type="button" onClick={(e) => closeTab(e, tab.id)} className="ane-tab__close">
                                            <Icons.X />
                                        </button>
                                    </div>
                                ))}
                                <button type="button" onClick={addTab} className="ane-tab-plus">
                                    <Icons.Plus />
                                </button>
                            </div>
                        </div>

                        {/* Navigation Bar */}
                        <div className="ane-toolbar-wrap">
                            <div className="ane-toolbar">
                                <button type="button" onClick={goBack} disabled={!canGoBack} className="ane-nav-button"><Icons.ChevronLeft /></button>
                                <button type="button" onClick={goForward} disabled={!canGoForward} className="ane-nav-button"><Icons.ChevronRight /></button>
                                <button type="button" onClick={goHome} className="ane-nav-button"><Icons.Home /></button>
                                <button type="button" onClick={reload} className="ane-nav-button"><Icons.RotateCw /></button>
                                <button
                                    type="button"
                                    onClick={toggleBookmark}
                                    title={isBookmarked ? "取消收藏" : "添加到收藏夹"}
                                    className={`ane-nav-button ${isBookmarked ? 'is-active ane-nav-button--bookmarked' : ''}`}
                                >
                                    <Icons.Bookmark className={isBookmarked ? 'fill-current' : ''} />
                                </button>

                                <div className="ane-toolbar-divider"></div>

                                <form onSubmit={handleAddressBarSubmit} className="ane-address-form">
                                    <div className="ane-address-shell">
                                        <span className="ane-address-icon">
                                            {activeTab.url.startsWith('https') ? <Icons.Globe /> : <Icons.Search />}
                                        </span>
                                        <input
                                            type="text"
                                            value={addressBarValue}
                                            onChange={(e) => setAddressBarValue(e.target.value)}
                                            placeholder={t('Search or enter website...', language)}
                                            className="ane-address-input"
                                        />
                                    </div>
                                </form>

                                <div className="ane-toolbar-divider"></div>

                                <button
                                    type="button"
                                    id="smart-notes-trigger"
                                    onClick={() => setActiveModule(activeModule === 'notes' ? null : 'notes')}
                                    title={t('Smart Notes', language)}
                                    className={`ane-nav-button ${activeModule === 'notes' ? 'is-active' : ''}`}
                                >
                                    <Icons.FileText />
                                </button>

                                <div className="relative">
                                    <button type="button" onClick={() => setShowSettings(!showSettings)} className={`ane-nav-button ${showSettings ? 'is-active' : ''}`}>
                                        <Icons.Menu />
                                    </button>
                                    {showSettings && <SettingsMenu
                                        onClose={() => setShowSettings(false)}
                                        currentEngine={searchEngine}
                                        setEngine={setSearchEngine}
                                        user={user}
                                        onLogin={handleLogin}
                                        onLogout={handleLogout}
                                        themeSettings={themeSettings}
                                        handleThemeChange={handleThemeChange}
                                        resetTheme={resetTheme}
                                        onOpenModule={setActiveModule}
                                        addTab={addTab}
                                        language={language}
                                        setLanguage={handleLanguageChange}
                                        onClearBrowsingData={handleClearBrowsingData}
                                    />}
                                </div>
                            </div>
                        </div>

                        {/* Browser Viewport */}
                        <div className="ane-main-panel">
                            {tabs.map(tab => (
                                <div key={tab.id} className={`w-full h-full ${activeTabId === tab.id ? 'block' : 'hidden'}`}>
                                    {!tab.url ? (
                                        <HomeView onNavigate={(url) => navigate(url)} onOpenModule={(module) => setActiveModule(module)} language={language} />
                                    ) : (
                                        <webview ref={(el) => { if (el) { webviewRefs.current[tab.id] = el; handleWebviewMount(el); } }} src={tab.url} className="w-full h-full" />
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* === 虛假登入/註冊視窗 (Fake Auth Modal) === */}
                        {showLoginModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in">
                                <div className="w-80 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 p-6 animate-slide-up">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-bold text-gray-800">
                                            {isLoginMode ? t('Login', language) : t('Sign Up', language)}
                                        </h2>
                                        <button onClick={() => setShowLoginModal(false)} className="p-1.5 hover:bg-gray-200 rounded-full transition-colors">
                                            <Icons.X className="w-4 h-4 text-gray-500" />
                                        </button>
                                    </div>
                                    <form onSubmit={submitFakeAuth} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">{t('Username', language)}</label>
                                            <input
                                                type="text"
                                                value={authForm.username}
                                                onChange={e => setAuthForm({ ...authForm, username: e.target.value })}
                                                placeholder={t('Enter username', language)}
                                                className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">{t('Password', language)}</label>
                                            <input
                                                type="password"
                                                value={authForm.password}
                                                onChange={e => setAuthForm({ ...authForm, password: e.target.value })}
                                                placeholder={t('Enter password', language)}
                                                className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>

                                        {!isLoginMode && (
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">{t('Confirm Password', language)}</label>
                                                <input
                                                    type="password"
                                                    value={authForm.confirmPassword}
                                                    onChange={e => setAuthForm({ ...authForm, confirmPassword: e.target.value })}
                                                    placeholder={t('Re-enter password', language)}
                                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    required
                                                />
                                            </div>
                                        )}

                                        <button type="submit" className="w-full py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors mt-4 shadow-md shadow-blue-500/30">
                                            {isLoginMode ? t('Confirm Login', language) : t('Register Account', language)}
                                        </button>
                                    </form>

                                    <div className="mt-5 text-center text-sm text-gray-600">
                                        {isLoginMode ? t("Don't have an account? ", language) : t("Already have an account? ", language)}
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setIsLoginMode(!isLoginMode);
                                                setAuthForm({ username: '', password: '', confirmPassword: '' });
                                            }}
                                            className="text-blue-600 hover:text-blue-700 hover:underline font-semibold"
                                        >
                                            {isLoginMode ? t('Register Now', language) : t('Back to Login', language)}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}


                        {/* Modules Overlay */}
                        <AIAssistantModule isOpen={activeModule === 'ai-assistant'} onClose={() => setActiveModule(null)} language={language} />
                        <ChatRoomModule isOpen={activeModule === 'chatroom'} onClose={() => setActiveModule(null)} language={language} user={user} />
                        <SmartNotesModule isOpen={activeModule === 'notes'} onClose={() => setActiveModule(null)} language={language} />
                        <HistoryModule isOpen={activeModule === 'history'} onClose={() => setActiveModule(null)} tabs={tabs} onNavigate={(url) => { navigate(url); setActiveModule(null); }} language={language} />
                        <BookmarksModule isOpen={activeModule === 'bookmarks'} onClose={() => setActiveModule(null)} onNavigate={(url) => { navigate(url); setActiveModule(null); }} language={language} />
                        <DownloadsModule isOpen={activeModule === 'downloads'} onClose={() => setActiveModule(null)} language={language} />
                        <PomodoroModule isOpen={activeModule === 'pomodoro'} onClose={() => setActiveModule(null)} language={language} />
                        <TodoListModule isOpen={activeModule === 'todo'} onClose={() => setActiveModule(null)} language={language} />
                        <ScheduleModule isOpen={activeModule === 'schedule'} onClose={() => setActiveModule(null)} language={language} />
                        <WeatherModule isOpen={activeModule === 'weather'} onClose={() => setActiveModule(null)} language={language} />
                        <MuteModeModule isOpen={activeModule === 'mute'} onClose={() => setActiveModule(null)} language={language} />
                    </div>
                </div>
            );

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Notes App Module -->
    <script type="module">
        import App from "../notes/js/App.js";

        // Initialize the Notes App for React module to call
        let notesAppInstance = null;
        window.initNotesApp = function () {
            if (notesAppInstance) return;
            const root = document.getElementById("notes-app-root");
            if (root) notesAppInstance = new App(root);
        };

        window.notesAutoSave = async function (text, url) {
            if (!notesAppInstance) return false;
            return await notesAppInstance.addNoteFromCopy(text, url);
        };

        window.isNotesAutoSaveEnabled = function () {
            if (!notesAppInstance) return false;
            return notesAppInstance.isAutoSaveEnabled;
        };
    </script>
</body>

</html>
