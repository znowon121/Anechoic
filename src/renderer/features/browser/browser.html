        // Downloads Module
        const DownloadsModule = ({ isOpen, onClose, language }) => {
            const [downloads, setDownloads] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(false);
            const [isConfirmingClear, setIsConfirmingClear] = useState(false);

            const mergeDownload = (list, incoming) => {
                if (!incoming?.id) return list;
                const index = list.findIndex(item => item.id === incoming.id);
                if (index === -1) return [incoming, ...list];
                const next = [...list];
                next[index] = { ...next[index], ...incoming };
                return next;
            };

            const loadDownloads = async () => {
                setLoading(true);
                if (window.electronAPI?.getDownloads) {
                    const result = await window.electronAPI.getDownloads();
                    if (result?.ok) {
                        setDownloads(result.data || []);
                    } else {
                        setDownloads([]);
                    }
                } else {
                    setDownloads([]);
                }
                setLoading(false);
            };

            useEffect(() => {
                if (!isOpen) return;

                loadDownloads();
                setIsConfirmingClear(false);

                let unsubscribe;
                if (window.electronAPI?.onDownloadsUpdated) {
                    unsubscribe = window.electronAPI.onDownloadsUpdated((incoming) => {
                        setDownloads(prev => mergeDownload(prev, incoming));
                    });
                }
                return () => {
                    if (typeof unsubscribe === 'function') {
                        unsubscribe();
                    }
                };
            }, [isOpen]);

            const statusLabel = (status) => {
                if (status === 'downloading') return 'Downloading';
                if (status === 'completed') return 'Completed';
                if (status === 'cancelled') return 'Cancelled';
                if (status === 'interrupted') return 'Interrupted';
                return 'Unknown';
            };

            const statusColor = (status) => {
                if (status === 'completed') return '#3d8a64';
                if (status === 'downloading') return '#6f7278';
                return '#c04040';
            };

            const toMB = (bytes) => {
                const value = Number(bytes || 0) / (1024 * 1024);
                return `${value.toFixed(value >= 100 ? 0 : 1)} MB`;
            };

            const handleOpen = async (id) => {
                if (!window.electronAPI?.openDownload) return;
                const result = await window.electronAPI.openDownload(id);
                if (!result?.ok) {
                    showToast(result?.error || 'Unable to open file', 'error');
                }
            };

            const handleShowInFolder = async (id) => {
                if (!window.electronAPI?.showDownloadInFolder) return;
                const result = await window.electronAPI.showDownloadInFolder(id);
                if (!result?.ok) {
                    showToast(result?.error || 'Unable to reveal file', 'error');
                }
            };

            const handleRemove = async (id) => {
                if (!window.electronAPI?.removeDownload) return;
                const result = await window.electronAPI.removeDownload(id);
                if (result?.ok) {
                    setDownloads(result.data || []);
                }
            };

            const handleClear = async () => {
                if (!window.electronAPI?.clearDownloads) return;
                const result = await window.electronAPI.clearDownloads();
                if (result?.ok) {
                    setDownloads([]);
                    setIsConfirmingClear(false);
                    showToast('Downloads cleared', 'success');
                }
            };

            const filteredDownloads = downloads.filter(item => {
                const needle = searchTerm.toLowerCase();
                return (item.fileName || '').toLowerCase().includes(needle) || (item.url || '').toLowerCase().includes(needle);
            });

            if (!isOpen) return null;

            return (
                <div className="ane-overlay-backdrop" onClick={onClose}>
                    <div className="ane-utility-modal ane-utility-modal--bookmarks" style={{ width: '720px', height: '640px' }} onClick={(e) => e.stopPropagation()}>
                        <div className="ane-utility-header">
                            <span className="ane-utility-header__icon" style={{ background: 'rgba(111,114,120,0.08)', color: '#6f7278' }}>
                                <Icons.Download />
                            </span>
                            <span className="ane-utility-header__title">{t('Downloads', language)}</span>
                            {downloads.length > 0 && !isConfirmingClear && (
                                <button type="button" className="ane-utility-ghost is-destructive" onClick={() => setIsConfirmingClear(true)}>
                                    {t('Clear All', language)}
                                </button>
                            )}
                            {isConfirmingClear && (
                                <>
                                    <button type="button" className="ane-utility-ghost is-destructive" onClick={handleClear}>{t('Yes', language)}</button>
                                    <button type="button" className="ane-utility-ghost" onClick={() => setIsConfirmingClear(false)}>{t('No', language)}</button>
                                </>
                            )}
                            <button type="button" className="ane-utility-close" onClick={onClose}><Icons.X /></button>
                        </div>

                        <div className="ane-utility-search-wrap">
                            <div className="ane-utility-search">
                                <span className="ane-utility-search__icon"><Icons.Search /></span>
                                <input
                                    type="text"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search downloads..."
                                />
                            </div>
                        </div>

                        <div className="ane-utility-list">
                            {loading ? (
                                <div className="ane-utility-empty">Loading downloads...</div>
                            ) : filteredDownloads.length === 0 ? (
                                <div className="ane-utility-empty">
                                    <Icons.Download />
                                    <div>No downloads yet</div>
                                </div>
                            ) : (
                                filteredDownloads.map((item) => {
                                    const totalBytes = Number(item.totalBytes || 0);
                                    const receivedBytes = Number(item.receivedBytes || 0);
                                    const progress = totalBytes > 0 ? Math.min(100, Math.round((receivedBytes / totalBytes) * 100)) : (item.status === 'completed' ? 100 : 0);

                                    return (
                                        <div key={item.id} className="ane-utility-row" style={{ cursor: 'default' }}>
                                            <span className="ane-utility-row__chip">{(item.fileName || 'D').charAt(0).toUpperCase()}</span>
                                            <span className="ane-utility-row__meta">
                                                <span className="ane-utility-row__title">{item.fileName || 'download'}</span>
                                                <span className="ane-utility-row__sub">
                                                    <span style={{ color: statusColor(item.status), fontWeight: 600, marginRight: '8px' }}>{statusLabel(item.status)}</span>
                                                    <span>{toMB(receivedBytes)} / {totalBytes > 0 ? toMB(totalBytes) : '--'}</span>
                                                </span>
                                                <span style={{ display: 'block', marginTop: '6px', width: '100%', height: '4px', background: '#ececef', borderRadius: '999px', overflow: 'hidden' }}>
                                                    <span style={{ display: 'block', width: `${progress}%`, height: '100%', background: '#6f7278' }}></span>
                                                </span>
                                            </span>
                                            <span className="ane-utility-row__actions" style={{ opacity: 1 }}>
                                                {item.status === 'completed' && (
                                                    <>
                                                        <button type="button" className="ane-utility-action" title="Open" onClick={() => handleOpen(item.id)}>
                                                            <Icons.Globe />
                                                        </button>
                                                        <button type="button" className="ane-utility-action" title="Show in folder" onClick={() => handleShowInFolder(item.id)}>
                                                            <Icons.Folder />
                                                        </button>
                                                    </>
                                                )}
                                                <button type="button" className="ane-utility-action is-danger" title="Remove" onClick={() => handleRemove(item.id)}>
                                                    <Icons.Trash />
                                                </button>
                                            </span>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Pomodoro Module
        const PomodoroModule = ({ isOpen, onClose, language }) => {
            const [timeLeft, setTimeLeft] = useState(25 * 60); // 25 minutes in seconds
            const [isActive, setIsActive] = useState(false);
            const [mode, setMode] = useState('work'); // 'work', 'shortBreak', 'longBreak'
            const [cycles, setCycles] = useState(0);
            const intervalRef = useRef(null);

            const modes = {
                work: { time: 25 * 60, tab: t('Work', language), label: t('Work Time', language) },
                shortBreak: { time: 5 * 60, tab: t('Short Break', language), label: t('Short Break', language) },
                longBreak: { time: 15 * 60, tab: t('Long Break', language), label: t('Long Break', language) }
            };
            const ringSize = 164;
            const ringStroke = 1.5;
            const ringRadius = (ringSize - ringStroke * 2) / 2;
            const ringCircumference = 2 * Math.PI * ringRadius;
            const progress = timeLeft / modes[mode].time;
            const dashOffset = ringCircumference * (1 - progress);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const startTimer = () => {
                setIsActive(true);
                intervalRef.current = setInterval(() => {
                    setTimeLeft(time => {
                        if (time <= 1) {
                            clearInterval(intervalRef.current);
                            setIsActive(false);
                            handleTimerComplete();
                            return 0;
                        }
                        return time - 1;
                    });
                }, 1000);
            };

            const pauseTimer = () => {
                setIsActive(false);
                clearInterval(intervalRef.current);
            };

            const resetTimer = () => {
                setIsActive(false);
                clearInterval(intervalRef.current);
                setTimeLeft(modes[mode].time);
            };

            const handleTimerComplete = () => {
                if (mode === 'work') {
                    const newCycles = cycles + 1;
                    setCycles(newCycles);
                    if (newCycles % 4 === 0) {
                        setMode('longBreak');
                        setTimeLeft(modes.longBreak.time);
                    } else {
                        setMode('shortBreak');
                        setTimeLeft(modes.shortBreak.time);
                    }
                } else {
                    setMode('work');
                    setTimeLeft(modes.work.time);
                }
            };

            const switchMode = (newMode) => {
                setMode(newMode);
                setTimeLeft(modes[newMode].time);
                setIsActive(false);
                clearInterval(intervalRef.current);
            };

            useEffect(() => {
                return () => clearInterval(intervalRef.current);
            }, []);

            if (!isOpen) return null;

            return (
                <div className="ane-overlay-backdrop" onClick={onClose}>
                    <div className="ane-utility-modal ane-utility-modal--pomodoro" onClick={(e) => e.stopPropagation()}>
                        <div className="ane-utility-header">
                            <span className="ane-utility-header__icon" style={{ background: 'rgba(212,107,95,0.08)', color: '#D46B5F' }}>
                                <Icons.Clock />
                            </span>
                            <span className="ane-utility-header__title">{t('Pomodoro', language)}</span>
                            <button type="button" className="ane-utility-close" onClick={onClose}><Icons.X /></button>
                        </div>

                        <div className="ane-pomo-body">
                            <div className="ane-pomo-segments">
                                {Object.entries(modes).map(([key, config]) => (
                                    <button
                                        key={key}
                                        type="button"
                                        onClick={() => switchMode(key)}
                                        className={`ane-pomo-segment ${mode === key ? 'is-active' : ''}`}
                                    >
                                        {config.tab}
                                    </button>
                                ))}
                            </div>

                            <div className="ane-pomo-ring-wrap">
                                <svg width={ringSize} height={ringSize} style={{ position: 'absolute', inset: 0, transform: 'rotate(-90deg)' }}>
                                    <circle
                                        cx={ringSize / 2}
                                        cy={ringSize / 2}
                                        r={ringRadius}
                                        fill="none"
                                        stroke="rgba(0,0,0,0.07)"
                                        strokeWidth={ringStroke}
                                    />
                                    <circle
                                        cx={ringSize / 2}
                                        cy={ringSize / 2}
                                        r={ringRadius}
                                        fill="none"
                                        stroke={isActive ? '#D46B5F' : 'rgba(212,107,95,0.22)'}
                                        strokeWidth={ringStroke}
                                        strokeLinecap="round"
                                        strokeDasharray={ringCircumference}
                                        strokeDashoffset={dashOffset}
                                        style={{ transition: 'stroke-dashoffset 0.9s linear, stroke 0.35s ease' }}
                                    />
                                </svg>
                                <span className="ane-pomo-time" style={{ color: isActive ? '#D46B5F' : '#1F2023' }}>{formatTime(timeLeft)}</span>
                            </div>

                            <div className="ane-pomo-label">{modes[mode].label}</div>
                            <div className="ane-pomo-cycles">
                                {cycles === 0 ? 'No cycles completed yet' : `${cycles} ${cycles === 1 ? 'cycle' : 'cycles'} completed`}
                            </div>

                            <div className="ane-pomo-actions">
                                {!isActive ? (
                                    <button type="button" className="ane-pomo-start" onClick={startTimer}>{t('Start', language)}</button>
                                ) : (
                                    <button type="button" className="ane-pomo-start is-active" onClick={pauseTimer}>{t('Pause', language)}</button>
                                )}
                                <button type="button" className="ane-pomo-reset" onClick={resetTimer}>{t('Reset', language)}</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Todo List Module
        const TodoListModule = ({ isOpen, onClose, language }) => {
            const [todos, setTodos] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            // 視圖與日期狀態
            const [viewMode, setViewMode] = useState('list'); // 預設改為 'list' 以便看清三大區域
            const [selectedDate, setSelectedDate] = useState('');
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // 表單狀態
            const [priority, setPriority] = useState('medium');
            const [startDate, setStartDate] = useState('');
            const [startTime, setStartTime] = useState('');
            const [endDate, setEndDate] = useState('');
            const [endTime, setEndTime] = useState('');

            // 拖曳排序狀態
            const [draggedItemId, setDraggedItemId] = useState(null);

            // 權重設定：用於自動排序與日曆圓點顏色
            const priorityWeight = { high: 3, medium: 2, low: 1 };
            const priorityColors = {
                high: 'border-l-red-500',
                medium: 'border-l-yellow-400',
                low: 'border-l-green-500'
            };

            // 取得本地系統的「今日」字串 (YYYY-MM-DD)
            const getLocalToday = () => {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const systemToday = getLocalToday();

            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        const saved = localStorage.getItem(getStorageKey('anechoic_todos'));
                        const data = saved ? JSON.parse(saved) : [];
                        setTodos(data);
                    } catch (e) {
                        console.error(e);
                        setTodos([]);
                    }
                    setSelectedDate(systemToday);
                    setStartDate(systemToday);
                    setEndDate(systemToday);
                    setLoading(false);
                }
            }, [isOpen, systemToday]);

            const saveTodos = (newTodos) => {
                localStorage.setItem(getStorageKey('anechoic_todos'), JSON.stringify(newTodos));
                setTodos(newTodos);
            };

            // === 自動排序邏輯 ===
            const sortTodosArray = (list) => {
                return [...list].sort((a, b) => {
                    // 1. 未完成排前面
                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    // 2. 緊急程度 (High > Med > Low)
                    if (priorityWeight[a.priority] !== priorityWeight[b.priority]) {
                        return priorityWeight[b.priority] - priorityWeight[a.priority];
                    }
                    // 3. 截止時間早的排前面
                    const dateA = a.endDate || a.startDate || '9999-12-31';
                    const dateB = b.endDate || b.startDate || '9999-12-31';
                    if (dateA !== dateB) return dateA.localeCompare(dateB);

                    const timeA = a.endTime || a.startTime || '23:59';
                    const timeB = b.endTime || b.startTime || '23:59';
                    return timeA.localeCompare(timeB);
                });
            };

            const addTodo = (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const newTodo = {
                    id: Date.now(),
                    text: input.trim(),
                    completed: false,
                    priority,
                    startDate: viewMode === 'calendar' ? selectedDate : startDate,
                    startTime,
                    endDate: viewMode === 'calendar' ? selectedDate : endDate,
                    endTime
                };

                const newTodos = sortTodosArray([...todos, newTodo]);
                saveTodos(newTodos);

                setInput('');
                setStartTime('');
                setEndTime('');
                showToast(t('Task added', language), 'success');
            };

            const toggleTodo = (id) => {
                const newTodos = todos.map(todo =>
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                );
                saveTodos(sortTodosArray(newTodos));
            };

            const deleteTodo = (id) => {
                const newTodos = todos.filter(todo => todo.id !== id);
                saveTodos(newTodos);
                showToast(t('Task deleted', language), 'success');
            };

            // === 拖曳排序邏輯 ===
            const handleDragStart = (e, id) => {
                setDraggedItemId(id);
                e.dataTransfer.effectAllowed = "move";
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            };

            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (draggedItemId === targetId || !draggedItemId) return;

                const newTodos = [...todos];
                const draggedIdx = newTodos.findIndex(t => t.id === draggedItemId);
                const targetIdx = newTodos.findIndex(t => t.id === targetId);

                if (draggedIdx !== -1 && targetIdx !== -1) {
                    const [draggedItem] = newTodos.splice(draggedIdx, 1);
                    newTodos.splice(targetIdx, 0, draggedItem);
                    saveTodos(newTodos);
                }
                setDraggedItemId(null);
            };

            // === 日曆與跨日判斷邏輯 ===
            const isTaskOnDate = (t, dateStr) => {
                const start = t.startDate || t.endDate;
                const end = t.endDate || t.startDate;
                if (!start && !end) return false;
                return dateStr >= start && dateStr <= end;
            };

            const isLongTermTask = (t) => t.startDate && t.endDate && t.startDate !== t.endDate;

            const renderCalendar = () => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();

                const days = [];
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-8"></div>);
                }

                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    const isSelected = selectedDate === dateStr;
                    const isToday = dateStr === systemToday;

                    const tasksOnThisDay = todos.filter(t => !t.completed && isTaskOnDate(t, dateStr));

                    let dotClass = '';
                    if (tasksOnThisDay.length > 0) {
                        const highestPriority = tasksOnThisDay.sort((a, b) => priorityWeight[b.priority] - priorityWeight[a.priority])[0].priority;
                        dotClass = highestPriority === 'high' ? 'bg-red-500' : highestPriority === 'medium' ? 'bg-yellow-400' : 'bg-green-500';
                    }

                    days.push(
                        <button
                            key={i}
                            onClick={() => {
                                setSelectedDate(dateStr);
                                setStartDate(dateStr);
                                setEndDate(dateStr);
                            }}
                            className={`h-8 w-8 rounded-full flex items-center justify-center text-sm relative transition-all mx-auto
                        ${isSelected ? 'bg-pink-500 text-white font-bold shadow-md' : 'text-gray-700 hover:bg-pink-100'}
                        ${isToday && !isSelected ? 'border-2 border-pink-300' : ''}
                    `}
                        >
                            {i}
                            {dotClass && !isSelected && (
                                <span className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${dotClass}`}></span>
                            )}
                        </button>
                    );
                }
                return days;
            };

            const changeMonth = (offset) => {
                setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + offset, 1));
            };

            // === 三大區域分流邏輯 ===
            // 日曆模式：僅顯示選定日期的任務。清單模式：顯示所有任務
            const displayTodos = viewMode === 'calendar'
                ? todos.filter(t => isTaskOnDate(t, selectedDate))
                : todos;

            // 分流規則：
            // 1. 長期計畫：起始與結束日期不同。
            // 2. 今日任務：非長期計畫，且日期等於系統當前日期。
            // 3. 其他任務：非長期計畫，且日期不等於系統當前日期 (可能是過去或未來)。
            const longTermTodos = displayTodos.filter(isLongTermTask);
            const todayTodos = displayTodos.filter(t => !isLongTermTask(t) && (t.startDate === systemToday || t.endDate === systemToday));
            const otherTodos = displayTodos.filter(t => !isLongTermTask(t) && t.startDate !== systemToday && t.endDate !== systemToday);

            const completedCount = displayTodos.filter(t => t.completed).length;
            const totalCount = displayTodos.length;
            const progress = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);

            const renderTodoListGroup = (list, title, iconStr) => {
                if (list.length === 0) return null;
                return (
                    <div className="mb-5 animate-fade-in">
                        <div className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1.5 px-1 uppercase tracking-wider">
                            <span className="text-sm">{iconStr}</span> {title}
                            <span className="bg-gray-200 text-gray-500 rounded-full px-2 py-0.5 text-[10px] ml-1">{list.length}</span>
                        </div>
                        <div className="space-y-2">
                            {list.map((todo) => (
                                <div
                                    key={todo.id}
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, todo.id)}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, todo.id)}
                                    className={`flex items-start gap-3 p-3 bg-white border border-gray-100 shadow-sm rounded-lg hover:shadow-md transition-all group border-l-[3px] cursor-move ${priorityColors[todo.priority || 'medium']} ${draggedItemId === todo.id ? 'opacity-50 border-dashed' : ''}`}
                                >
                                    <button
                                        onClick={() => toggleTodo(todo.id)}
                                        className={`w-5 h-5 rounded border-2 mt-0.5 flex items-center justify-center transition-colors shrink-0 ${todo.completed
                                            ? 'bg-pink-500 border-pink-500 text-white'
                                            : 'border-gray-300 hover:border-pink-400'
                                            }`}
                                    >
                                        {todo.completed && <Icons.CheckSquare className="w-3 h-3" />}
                                    </button>

                                    <div className="flex flex-col flex-1 min-w-0">
                                        <span className={`text-sm font-medium ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                                            {todo.text}
                                        </span>
                                        {(todo.startDate || todo.endDate) && (
                                            <div className="text-[10px] text-gray-400 mt-1 flex flex-wrap gap-2 font-mono bg-gray-50 px-2 py-1 rounded w-fit">
                                                {(todo.startDate || todo.startTime) && <span>{t('Start', language)}: {todo.startDate} {todo.startTime}</span>}
                                                {(todo.endDate || todo.endTime) && <span className={todo.priority === 'high' ? 'text-red-400 font-bold' : ''}>{t('End', language)}: {todo.endDate} {todo.endTime}</span>}
                                            </div>
                                        )}
                                    </div>

                                    <button
                                        onClick={() => deleteTodo(todo.id)}
                                        className="p-1.5 opacity-0 group-hover:opacity-100 hover:bg-red-50 rounded-lg transition-all text-red-500 shrink-0 mt-0.5"
                                        title={t('Delete task', language)}
                                    >
                                        <Icons.Trash className="w-4 h-4" />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm animate-fade-in">
                    <div className="w-[500px] h-[750px] bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden animate-slide-up">

                        {/* 頂部 Header & 視圖切換 */}
                        <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-4 bg-white/50 shrink-0">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center text-pink-600">
                                    <Icons.CheckSquare className="w-5 h-5" />
                                </div>
                                <span className="font-semibold text-gray-700">{t('Todo List', language)}</span>
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="flex bg-gray-100 p-1 rounded-lg">
                                    <button onClick={() => setViewMode('list')} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${viewMode === 'list' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>{t('List', language)}</button>
                                    <button onClick={() => setViewMode('calendar')} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${viewMode === 'calendar' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}>{t('Calendar', language)}</button>
                                </div>
                                <button onClick={onClose} className="p-2 hover:bg-gray-200/50 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                            </div>
                        </div>

                        {/* 1. 細長進度條 */}
                        <div className="h-1.5 w-full bg-gray-100 shrink-0">
                            <div className="h-full bg-gradient-to-r from-pink-400 to-pink-600 transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div>
                        </div>

                        {/* 2. 日曆區塊 (僅在日曆模式顯示) */}
                        {viewMode === 'calendar' && (
                            <div className="p-4 bg-gray-50/30 border-b border-gray-200/50 shrink-0 animate-slide-up">
                                <div className="flex justify-between items-center mb-2">
                                    <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-gray-200 rounded-lg text-gray-600"><Icons.ChevronLeft className="w-4 h-4" /></button>
                                    <span className="font-bold text-gray-700">
                                        {currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}
                                    </span>
                                    <button onClick={() => changeMonth(1)} className="p-1 hover:bg-gray-200 rounded-lg text-gray-600"><Icons.ChevronRight className="w-4 h-4" /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-1 text-center mb-1">
                                    {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => (
                                        <div key={d} className="text-xs font-semibold text-gray-400">{d}</div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-7 gap-1">
                                    {renderCalendar()}
                                </div>
                            </div>
                        )}

                        {/* 3. 任務新增表單 */}
                        <div className="p-4 bg-gray-50 border-b border-gray-200/50 flex flex-col gap-3 shrink-0">
                            <div className="flex flex-wrap gap-2 items-center">
                                <select value={priority} onChange={e => setPriority(e.target.value)} className="text-xs border border-gray-200 rounded-md p-1.5 outline-none bg-white font-medium text-gray-700 shadow-sm cursor-pointer hover:border-pink-300 transition-colors">
                                    <option value="high">{t('🔴 High', language)}</option>
                                    <option value="medium">{t('🟡 Medium', language)}</option>
                                    <option value="low">{t('🟢 Low', language)}</option>
                                </select>

                                <div className="flex text-xs items-center gap-1 bg-white border border-gray-200 rounded-md p-1 shadow-sm">
                                    <span className="text-gray-400 font-medium px-1">{t('Start', language)}</span>
                                    {viewMode === 'list' && <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="outline-none text-gray-600 bg-transparent cursor-pointer" />}
                                    <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)} className="outline-none text-gray-600 bg-transparent cursor-pointer" />
                                </div>

                                <div className="flex text-xs items-center gap-1 bg-white border border-gray-200 rounded-md p-1 shadow-sm">
                                    <span className="text-gray-400 font-medium px-1">{t('End', language)}</span>
                                    {viewMode === 'list' && <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="outline-none text-gray-600 bg-transparent cursor-pointer" />}
                                    <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)} className="outline-none text-gray-600 bg-transparent cursor-pointer" />
                                </div>
                            </div>

                            <form onSubmit={addTodo} className="flex gap-2">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder={t('Add a new task...', language)}
                                    className="flex-1 bg-white border border-gray-200 shadow-sm rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all"
                                />
                                <button type="submit" disabled={!input.trim()} className="px-4 py-2 bg-pink-500 text-white font-bold rounded-lg hover:bg-pink-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-md shadow-pink-500/20">
                                    {t('Add', language)}
                                </button>
                            </form>
                        </div>

                        {/* 4. 任務列表 (三區域顯示) */}
                        <div className="flex-1 overflow-y-auto p-4 bg-slate-50 relative">
                            {loading ? (
                                <div className="text-center text-gray-500 py-8">{t('Loading todos...', language)}</div>
                            ) : totalCount === 0 ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center py-10 text-gray-400">
                                    <Icons.CheckSquare className="w-12 h-12 mb-3 opacity-20" />
                                    <p className="text-sm font-medium">{t('No tasks yet. Add one above!', language)}</p>
                                </div>
                            ) : (
                                <>
                                    {/* 順序：今日 -> 其他 -> 長期 */}
                                    {renderTodoListGroup(todayTodos, t('Today', language), '🎯')}
                                    {renderTodoListGroup(otherTodos, t('Other', language), '📅')}
                                    {renderTodoListGroup(longTermTodos, t('Long-term', language), '📌')}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Schedule Module
        const ScheduleModule = ({ isOpen, onClose, language }) => {
            const [schedule, setSchedule] = useState([]);
            const [isFullView, setIsFullView] = useState(false); // 控制全覽模式

            // 預設顏色選項
            const colorOptions = [
                { id: 'indigo', bg: 'bg-indigo-500', text: 'text-indigo-100' },
                { id: 'blue', bg: 'bg-blue-500', text: 'text-blue-100' },
                { id: 'green', bg: 'bg-emerald-500', text: 'text-emerald-100' },
                { id: 'yellow', bg: 'bg-amber-500', text: 'text-amber-100' },
                { id: 'orange', bg: 'bg-orange-500', text: 'text-orange-100' },
                { id: 'red', bg: 'bg-rose-500', text: 'text-rose-100' },
                { id: 'pink', bg: 'bg-pink-500', text: 'text-pink-100' },
                { id: 'purple', bg: 'bg-purple-500', text: 'text-purple-100' }
            ];

            // 更新輸入狀態：改用開始與結束時間
            const [input, setInput] = useState({
                day: 'Monday',
                startHour: '09', startMinute: '00', startAmpm: 'AM',
                endHour: '10', endMinute: '30', endAmpm: 'AM',
                color: colorOptions[0].id,
                subject: '',
                other: ''
            });

            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        const saved = localStorage.getItem(getStorageKey('anechoic_schedule'));
                        const data = saved ? JSON.parse(saved) : [];
                        setSchedule(data);
                    } catch (e) {
                        console.error(e);
                        setSchedule([]);
                    }
                    setLoading(false);
                    setIsFullView(false); // 每次打開預設為普通模式
                }
            }, [isOpen]);

            const saveSchedule = (newSchedule) => {
                localStorage.setItem(getStorageKey('anechoic_schedule'), JSON.stringify(newSchedule));
                setSchedule(newSchedule);
            };

            // 將 12 小時制轉換為當天分鐘數 (從午夜 00:00 起算)
            const getMinutesFromMidnight = (hour, minute, ampm) => {
                let h = parseInt(hour, 10);
                let m = parseInt(minute, 10);
                if (h === 12) h = 0;
                if (ampm === 'PM') h += 12;
                return h * 60 + m;
            };

            const addClass = (e) => {
                e.preventDefault();

                const startMins = getMinutesFromMidnight(input.startHour, input.startMinute, input.startAmpm);
                const endMins = getMinutesFromMidnight(input.endHour, input.endMinute, input.endAmpm);

                // 防呆：結束時間必須晚於開始時間
                if (endMins <= startMins) {
                    alert(t('End time must be later than start time!', language) || '錯誤：結束時間必須晚於開始時間！');
                    return;
                }
                if (!input.subject.trim()) return;

                // 計算並儲存 duration 以便渲染
                const duration = endMins - startMins;
                const newClass = { id: Date.now(), ...input, duration };
                const newSchedule = [...schedule, newClass];
                saveSchedule(newSchedule);

                // 新增後保留時間與顏色設定，清空文字框方便輸入下一堂
                setInput({ ...input, subject: '', other: '' });
                showToast(t('Class added', language) || '已新增課程', 'success');
            };

            const deleteClass = (id) => {
                const newSchedule = schedule.filter(cls => cls.id !== id);
                saveSchedule(newSchedule);
                showToast(t('Class deleted', language) || '已刪除課程', 'success');
            };

            // 將課程按星期分組
            const groupedSchedule = schedule.reduce((acc, cls) => {
                if (!acc[cls.day]) acc[cls.day] = [];
                acc[cls.day].push(cls);
                return acc;
            }, {});

            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const hoursList = Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, '0'));
            const minutesList = ['00', '05', '10', '15', '20', '25', '30', '35', '40', '45', '50', '55'];

            // 網格渲染設定
            const START_HOUR = 7; // 課表從早上 7 點開始
            const END_HOUR = 23;  // 課表到晚上 11 點結束
            const TOTAL_HOURS = END_HOUR - START_HOUR;

            // 全覽模式下縮小像素比例，並擴大視窗尺寸
            const PIXELS_PER_MINUTE = isFullView ? 0.9 : 1.5;
            const GRID_OFFSET_Y = 20; // 往下推 20px 避免頂部文字被切掉
            const containerSizeClass = isFullView ? "w-[95vw] h-[95vh]" : "w-[1200px] h-[85vh]";

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in">
                    <div className={`${containerSizeClass} bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden transition-all duration-300 animate-slide-up`}>

                        {/* 標題列 */}
                        <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-6 bg-white shrink-0">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                                    <Icons.Calendar className="w-5 h-5" />
                                </div>
                                <span className="font-bold text-gray-800 text-lg">{t('Student Schedule', language)}</span>
                            </div>

                            <div className="flex items-center gap-4">
                                {/* 完整視圖切換按鈕 */}
                                <button
                                    onClick={() => setIsFullView(!isFullView)}
                                    className={`px-3 py-1.5 rounded-lg text-sm font-bold transition-colors shadow-sm flex items-center gap-1.5 ${isFullView ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'}`}
                                >
                                    {isFullView ? (t('Exit Full View', language) || '退出全覽') : (t('Full View', language) || '👀 完整課表')}
                                </button>

                                <div className="w-px h-5 bg-gray-300"></div> {/* 分隔線 */}

                                <button onClick={onClose} className="p-1.5 hover:bg-gray-100 rounded-full transition-colors">
                                    <Icons.X className="w-5 h-5 text-gray-500" />
                                </button>
                            </div>
                        </div>

                        {/* 控制面板 (全覽模式下隱藏) */}
                        {!isFullView && (
                            <div className="p-4 border-b border-gray-200 bg-gray-50/50 shrink-0">
                                <form onSubmit={addClass} className="flex flex-wrap gap-4 items-end">
                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t('Day', language) || '星期'}</label>
                                        <select value={input.day} onChange={(e) => setInput({ ...input, day: e.target.value })} className="bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer shadow-sm">
                                            {days.map(day => <option key={day} value={day}>{t(day, language)}</option>)}
                                        </select>
                                    </div>

                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t('Start Time', language) || '開始時間'}</label>
                                        <div className="flex bg-white border border-gray-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500 shadow-sm">
                                            <select value={input.startHour} onChange={(e) => setInput({ ...input, startHour: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer hover:bg-gray-50 text-center">
                                                {hoursList.map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                            <span className="py-2 text-gray-400 font-bold">:</span>
                                            <select value={input.startMinute} onChange={(e) => setInput({ ...input, startMinute: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer hover:bg-gray-50 text-center">
                                                {minutesList.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                            <select value={input.startAmpm} onChange={(e) => setInput({ ...input, startAmpm: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer font-medium text-indigo-600 border-l border-gray-200 hover:bg-gray-50">
                                                <option value="AM">AM</option><option value="PM">PM</option>
                                            </select>
                                        </div>
                                    </div>

                                    <span className="mb-3 text-gray-400 font-bold">-</span>

                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t('End Time', language) || '結束時間'}</label>
                                        <div className="flex bg-white border border-gray-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500 shadow-sm">
                                            <select value={input.endHour} onChange={(e) => setInput({ ...input, endHour: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer hover:bg-gray-50 text-center">
                                                {hoursList.map(h => <option key={h} value={h}>{h}</option>)}
                                            </select>
                                            <span className="py-2 text-gray-400 font-bold">:</span>
                                            <select value={input.endMinute} onChange={(e) => setInput({ ...input, endMinute: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer hover:bg-gray-50 text-center">
                                                {minutesList.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                            <select value={input.endAmpm} onChange={(e) => setInput({ ...input, endAmpm: e.target.value })} className="px-1 py-2 text-sm outline-none bg-transparent cursor-pointer font-medium text-indigo-600 border-l border-gray-200 hover:bg-gray-50">
                                                <option value="AM">AM</option><option value="PM">PM</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-1 flex-1 min-w-[120px]">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t('Subject', language) || '科目'}</label>
                                        <input type="text" value={input.subject} onChange={(e) => setInput({ ...input, subject: e.target.value })} placeholder={t('e.g. Calculus', language)} className="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" />
                                    </div>

                                    <div className="flex flex-col gap-1 w-28">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t('Other', language) || '其他'}</label>
                                        <input type="text" value={input.other} onChange={(e) => setInput({ ...input, other: e.target.value })} placeholder={t('Room etc...', language)} className="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" />
                                    </div>

                                    <div className="flex flex-col gap-1">
                                        <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider shrink-0">{t('Color', language) || '顏色'}</label>
                                        <div className="flex gap-1 h-[38px] items-center px-1">
                                            {colorOptions.map(c => (
                                                <button
                                                    key={c.id}
                                                    type="button"
                                                    onClick={() => setInput({ ...input, color: c.id })}
                                                    className={`w-6 h-6 rounded-full ${c.bg} shadow-sm border-2 transition-transform ${input.color === c.id ? 'border-gray-800 scale-125' : 'border-transparent hover:scale-110'}`}
                                                />
                                            ))}
                                        </div>
                                    </div>

                                    <button type="submit" disabled={!input.subject.trim()} className="px-6 py-2 h-[38px] bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-bold shadow-md shadow-indigo-500/20">
                                        {t('Add', language) || '新增'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* 行事曆網格視圖 (Grid View) */}
                        <div className="flex-1 overflow-hidden flex flex-col bg-white">
                            {loading ? (
                                <div className="flex-1 flex items-center justify-center text-gray-500">{t('Loading schedule...', language)}</div>
                            ) : (
                                <>
                                    {/* 頂部星期標題 (Sticky Header) */}
                                    <div className="flex border-b border-gray-200 bg-gray-50 shadow-sm z-10 shrink-0">
                                        <div className="w-16 shrink-0 border-r border-gray-200"></div>
                                        {days.map(day => (
                                            <div key={day} className="flex-1 text-center py-3 font-bold text-gray-600 text-sm tracking-wider border-r border-gray-100 last:border-r-0">
                                                {t(day, language)}
                                            </div>
                                        ))}
                                    </div>

                                    {/* 網格主體 (可垂直滾動) */}
                                    <div className="flex-1 overflow-y-auto relative bg-slate-50">
                                        {/* 高度加上上下 Offset 確保不被切到 */}
                                        <div className="flex relative pb-10" style={{ height: `${TOTAL_HOURS * 60 * PIXELS_PER_MINUTE + GRID_OFFSET_Y * 2}px` }}>

                                            {/* 1. 左側時間軸 */}
                                            <div className="w-16 shrink-0 border-r border-gray-200 bg-white relative z-10">
                                                {Array.from({ length: TOTAL_HOURS + 1 }).map((_, i) => {
                                                    const hour = START_HOUR + i;
                                                    const ampm = hour >= 12 && hour < 24 ? 'PM' : 'AM';
                                                    let displayHour = hour > 12 ? hour - 12 : hour;
                                                    if (displayHour === 0) displayHour = 12; // 處理 12 PM / 12 AM

                                                    return (
                                                        <div
                                                            key={i}
                                                            className="absolute w-full text-right pr-2 text-xs font-bold text-gray-400"
                                                            style={{
                                                                top: `${i * 60 * PIXELS_PER_MINUTE + GRID_OFFSET_Y}px`,
                                                                transform: 'translateY(-50%)' // 確保文字絕對垂直置中，不再被切斷
                                                            }}
                                                        >
                                                            {displayHour} {ampm}
                                                        </div>
                                                    );
                                                })}
                                            </div>

                                            {/* 2. 背景橫線 */}
                                            <div className="absolute inset-0 left-16 right-0 pointer-events-none">
                                                {Array.from({ length: TOTAL_HOURS + 1 }).map((_, i) => (
                                                    <div
                                                        key={i}
                                                        className="absolute w-full border-t border-gray-200"
                                                        style={{ top: `${i * 60 * PIXELS_PER_MINUTE + GRID_OFFSET_Y}px` }}
                                                    />
                                                ))}
                                            </div>

                                            {/* 3. 星期欄位與課程卡片 */}
                                            <div className="flex flex-1 ml-16 absolute inset-0">
                                                {days.map(day => (
                                                    <div key={day} className="flex-1 relative border-r border-gray-100 last:border-r-0">
                                                        {(groupedSchedule[day] || []).map(cls => {
                                                            // 相容舊資料或新資料的 startHour
                                                            const sHour = cls.startHour || cls.hour;
                                                            const sMinute = cls.startMinute || cls.minute;
                                                            const sAmpm = cls.startAmpm || cls.ampm;

                                                            const startMins = getMinutesFromMidnight(sHour, sMinute, sAmpm);
                                                            const offsetMins = startMins - (START_HOUR * 60);

                                                            if (offsetMins < 0) return null; // 排除早於 7AM 的課防呆

                                                            // 偏移量加上 GRID_OFFSET_Y 確保與線條對齊
                                                            const topPosition = offsetMins * PIXELS_PER_MINUTE + GRID_OFFSET_Y;
                                                            const cardHeight = (cls.duration || 60) * PIXELS_PER_MINUTE; // 舊資料預設給 60 分鐘

                                                            const colorStyle = colorOptions.find(c => c.id === cls.color) || colorOptions[0];

                                                            // 顯示用時間字串
                                                            const timeString = cls.endHour
                                                                ? `${cls.startHour}:${cls.startMinute} - ${cls.endHour}:${cls.endMinute} ${cls.endAmpm}`
                                                                : `${sHour}:${sMinute} ${sAmpm}`;

                                                            return (
                                                                <div
                                                                    key={cls.id}
                                                                    className={`absolute left-1 right-1 rounded-lg p-2 shadow-sm border border-white/20 group hover:z-20 transition-all hover:shadow-md ${colorStyle.bg} hover:brightness-110 overflow-hidden`}
                                                                    style={{
                                                                        top: `${topPosition}px`,
                                                                        height: `${cardHeight}px`,
                                                                        minHeight: '24px' // 防止被壓扁
                                                                    }}
                                                                >
                                                                    <div className="font-bold text-white text-xs sm:text-sm leading-tight truncate pr-4">
                                                                        {cls.subject}
                                                                    </div>

                                                                    {cardHeight >= 45 && (
                                                                        <div className={`text-[11px] mt-1 font-medium flex flex-col gap-0.5 ${colorStyle.text}`}>
                                                                            <div className="truncate">{timeString}</div>
                                                                            {cls.other && <div className="truncate opacity-90">{cls.other}</div>}
                                                                        </div>
                                                                    )}

                                                                    <button
                                                                        onClick={() => deleteClass(cls.id)}
                                                                        className="absolute top-1 right-1 w-5 h-5 bg-black/20 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-black/40"
                                                                        title="Delete"
                                                                    >
                                                                        <Icons.X className="w-3 h-3" />
                                                                    </button>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // Weather Module
        const WeatherModule = ({ isOpen, onClose, language }) => {
            const [city, setCity] = useState('');
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(false);
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [fetchTimer, setFetchTimer] = useState(null);
            const [expandedDayIndex, setExpandedDayIndex] = useState(null); // 追蹤目前展開的預報天數

            const POPULAR_CITIES = [
                { name: 'Tokyo', country: 'Japan', admin1: 'Tokyo', latitude: 35.6895, longitude: 139.6917 },
                { name: 'London', country: 'United Kingdom', admin1: 'England', latitude: 51.5085, longitude: -0.1257 },
                { name: 'New York', country: 'United States', admin1: 'New York', latitude: 40.7143, longitude: -74.006 },
                { name: 'Paris', country: 'France', admin1: 'Île-de-France', latitude: 48.8534, longitude: 2.3488 },
                { name: 'Sydney', country: 'Australia', admin1: 'New South Wales', latitude: -33.8678, longitude: 151.2073 },
                { name: 'Hong Kong', country: 'Hong Kong', admin1: '', latitude: 22.2783, longitude: 114.1747 },
                { name: 'Taipei', country: 'Taiwan', admin1: '', latitude: 25.0478, longitude: 121.5319 },
                { name: 'Seoul', country: 'South Korea', admin1: 'Seoul', latitude: 37.566, longitude: 126.9784 }
            ];

            const getWeatherDescription = (code) => {
                const codes = {
                    0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
                    45: 'Fog', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Moderate drizzle',
                    55: 'Dense drizzle', 61: 'Slight rain', 63: 'Moderate rain', 65: 'Heavy rain',
                    71: 'Slight snow', 73: 'Moderate snow', 75: 'Heavy snow', 77: 'Snow grains',
                    80: 'Slight rain showers', 81: 'Moderate rain showers', 82: 'Violent rain showers',
                    85: 'Slight snow showers', 86: 'Heavy snow showers', 95: 'Thunderstorm',
                    96: 'Thunderstorm with hail', 99: 'Thunderstorm with heavy hail'
                };
                return codes[code] || 'Unknown';
            };

            const getWeatherIcon = (code) => {
                if (code === 0 || code === 1) return '☀️';
                if (code === 2) return '⛅';
                if (code === 3 || code === 45 || code === 48) return '☁️';
                if (code >= 51 && code <= 67) return '🌧️';
                if (code >= 71 && code <= 86) return '❄️';
                if (code >= 95) return '⛈️';
                return '🌥️';
            };

            const getDayName = (dateString) => {
                const date = new Date(dateString);
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                return t(days[date.getDay()], language);
            };

            const showRecommendedCities = () => {
                const shuffled = [...POPULAR_CITIES].sort(() => 0.5 - Math.random());
                setSuggestions(shuffled.slice(0, 4));
                setShowSuggestions(true);
            };

            const fetchCitySuggestions = async (query) => {
                try {
                    const response = await fetch(
                        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`
                    );
                    const data = await response.json();
                    if (data.results) {
                        const uniqueMap = new Map();
                        data.results.forEach(item => {
                            const key = `${item.name}|${item.admin1 || ''}|${item.country}`;
                            if (!uniqueMap.has(key)) { uniqueMap.set(key, item); }
                        });
                        const uniqueResults = Array.from(uniqueMap.values());
                        setSuggestions(uniqueResults.map(item => ({
                            name: item.name, country: item.country, admin1: item.admin1,
                            latitude: item.latitude, longitude: item.longitude
                        })));
                    } else {
                        setSuggestions([]);
                    }
                } catch (error) {
                    console.error('Failed to fetch suggestions:', error);
                    setSuggestions([]);
                }
            };

            const handleInputChange = (e) => {
                const value = e.target.value;
                setCity(value);
                setShowSuggestions(true);

                if (fetchTimer) clearTimeout(fetchTimer);

                if (!value.trim()) {
                    showRecommendedCities();
                    return;
                }

                const timer = setTimeout(() => {
                    fetchCitySuggestions(value);
                }, 500);
                setFetchTimer(timer);
            };

            const selectSuggestion = (suggestion) => {
                setCity(suggestion.name);
                setShowSuggestions(false);
                if (fetchTimer) clearTimeout(fetchTimer);
                searchWeatherWithCoords(suggestion.latitude, suggestion.longitude, suggestion.name);
            };

            const searchWeatherWithCoords = async (lat, lon, name) => {
                setLoading(true);
                setExpandedDayIndex(null); // 每次重新搜尋時收合展開狀態
                try {
                    // 同時請求天氣 API 與 AQI (空氣品質) API
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relative_humidity_2m,windspeed_10m,cloudcover,surface_pressure,visibility&daily=weathercode,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_sum,windspeed_10m_max,uv_index_max&timezone=auto`;
                    const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=european_aqi&timezone=auto`;

                    const [weatherResponse, aqiResponse] = await Promise.all([
                        fetch(weatherUrl),
                        fetch(aqiUrl).catch(() => null) // AQI 抓取失敗不影響主要天氣
                    ]);

                    const weatherData = await weatherResponse.json();
                    const aqiData = aqiResponse && aqiResponse.ok ? await aqiResponse.json() : null;

                    const forecastData = [];
                    if (weatherData.daily) {
                        for (let i = 0; i < weatherData.daily.time.length; i++) {
                            // 擷取每天中午 12:00 的 hourly 數據作為當日的代表值 (索引為 i * 24 + 12)
                            const noonIndex = i * 24 + 12;

                            forecastData.push({
                                date: weatherData.daily.time[i],
                                maxTemp: Math.round(weatherData.daily.temperature_2m_max[i]),
                                minTemp: Math.round(weatherData.daily.temperature_2m_min[i]),
                                conditionCode: weatherData.daily.weathercode[i],

                                // 詳細指標 (來自 daily)
                                precipitation: weatherData.daily.precipitation_sum[i] || 0,
                                windMax: Math.round(weatherData.daily.windspeed_10m_max[i] || 0),
                                uvIndex: weatherData.daily.uv_index_max[i] || 0,
                                appMax: Math.round(weatherData.daily.apparent_temperature_max[i] || 0),
                                appMin: Math.round(weatherData.daily.apparent_temperature_min[i] || 0),

                                // 詳細指標 (來自 hourly 的 12:00 取樣)
                                humidity: weatherData.hourly.relative_humidity_2m[noonIndex] || 0,
                                cloudCover: weatherData.hourly.cloudcover[noonIndex] || 0,
                                pressure: Math.round(weatherData.hourly.surface_pressure[noonIndex] || 0),
                                visibility: Math.round((weatherData.hourly.visibility[noonIndex] || 0) / 1000), // 將公尺轉換為公里

                                // 空氣品質
                                aqi: aqiData && aqiData.hourly && aqiData.hourly.european_aqi ? aqiData.hourly.european_aqi[noonIndex] || '--' : '--'
                            });
                        }
                    }

                    setWeather({
                        condition: getWeatherDescription(weatherData.current_weather.weathercode),
                        conditionCode: weatherData.current_weather.weathercode,
                        temperature: Math.round(weatherData.current_weather.temperature),
                        humidity: weatherData.hourly.relative_humidity_2m[0] || 50,
                        cloudCover: weatherData.hourly.cloudcover[0] || 0,
                        windSpeed: Math.round(weatherData.current_weather.windspeed),
                        forecast: forecastData
                    });
                    setCity(name);
                    showToast(t('Weather for', language) + ' ' + name);
                } catch (error) {
                    console.error('Weather fetch error:', error);
                    showToast(t('Failed to fetch weather', language), 'error');
                } finally {
                    setLoading(false);
                }
            };

            const searchWeather = async (e) => {
                e.preventDefault();
                if (!city.trim()) return;

                setLoading(true);
                try {
                    const geoResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
                    const geoData = await geoResponse.json();

                    if (!geoData.results || geoData.results.length === 0) {
                        showToast(t('City not found', language), 'error');
                        setLoading(false);
                        return;
                    }

                    const { latitude, longitude, name } = geoData.results[0];
                    await searchWeatherWithCoords(latitude, longitude, name);
                } catch (error) {
                    console.error('Weather fetch error:', error);
                    showToast(t('Failed to fetch weather', language), 'error');
                    setLoading(false);

                    const saved = localStorage.getItem(getStorageKey('anechoic_shortcuts'));
                    const parsed = saved ? JSON.parse(saved) : null;
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        return parsed;
                    }
                } catch (error) {
                    // ignore parse errors and fallback to defaults
                }
                return defaultShortcuts;
            });
            const shortcutAccent = {
                Google: { bg: 'rgba(200,138,66,0.08)', color: '#C88A42' },
                Canvas: { bg: 'rgba(212,107,95,0.08)', color: '#D46B5F' },
                YouTube: { bg: 'rgba(212,107,95,0.08)', color: '#D46B5F' },
                Gmail: { bg: 'rgba(210,155,69,0.08)', color: '#D29B45' },
            };

            useEffect(() => {
                localStorage.setItem(getStorageKey('anechoic_shortcuts'), JSON.stringify(shortcuts));
            }, [shortcuts]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (inputValue.trim()) {
                    onNavigate(inputValue.trim());
                }
            };

            const normalizeUrl = (value) => {
                const trimmed = value.trim();
                if (!trimmed) return '';
                if (/^https?:\/\//i.test(trimmed)) return trimmed;
                return `https://${trimmed}`;
            };

            const handleAddShortcut = () => {
                const title = window.prompt(t('Name', language), '');
                if (!title || !title.trim()) return;

                const rawUrl = window.prompt(t('URL', language), 'https://');
                if (!rawUrl || !rawUrl.trim()) return;

                const normalizedUrl = normalizeUrl(rawUrl);
                const newShortcut = {
                    id: Date.now(),
                    title: title.trim().slice(0, 20),
                    url: normalizedUrl,
                    icon: title.trim().charAt(0).toUpperCase() || 'N'
                };

                setShortcuts(prev => [newShortcut, ...prev.slice(0, 15)]);
                showToast(`Shortcut added: ${newShortcut.title}`, 'success');
            };

            return (
                <div className="ane-home animate-fade-in">
                    <div className="ane-home__inner">
                        <h1 className="ane-home__title">Anechoic</h1>

                        <form onSubmit={handleSubmit} className="ane-home__search-form">
                            <div className="ane-home__search-shell">
                                <span className="ane-home__search-icon">
                                    <Icons.Search />
                                </span>
                                <input
                                    type="text"
                                    value={inputValue}

                                        '--ane-tile-accent-bg': (shortcutAccent[site.title] || {}).bg || 'rgba(200,138,66,0.08)',

                                    }}

                                    <div className="ane-shortcut__tile">{site.icon}</div>

                                </button>
