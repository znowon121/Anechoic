    <!-- React & ReactDOM -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Google Fonts: Inter (iOS style font) -->

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ios: {
                            blue: '#007AFF',
                            gray: '#F2F2F7',
                            separator: '#C6C6C8',
                            destruct: '#FF3B30'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
</head>

        // 2. 建立一個簡單的翻譯輔助函數
        const t = (key, lang) => {
            return translations[lang] && translations[lang][key] ? translations[lang][key] : (translations['en'][key] || key);
        };

        const { useState, useEffect, useRef } = React;
        // [新增] 根據當前使用者產生專屬的 LocalStorage Key
        const getStorageKey = (baseKey) => {
            const savedUser = localStorage.getItem('anechoic_user');
            const username = savedUser ? JSON.parse(savedUser).name : 'guest';
            return `${baseKey}_${username}`;
        };

        // === Helper Function: Convert Hex to RGBA ===
        const hexToRgba = (hex, alpha = 1) => {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        // === TOAST 系统 ===
        const showToast = function (msg, type = 'success', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) {
                console.warn('Toast container not found');
                return;
            }

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            toast.style.whiteSpace = 'nowrap';
            toast.style.minWidth = '300px';
            toast.style.textAlign = 'left';
            toast.style.willChange = 'transform';
            toast.style.animation = 'toastIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastOut 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
                setTimeout(() => {
                    toast.remove();
                }, 500);
            }, duration);
        };

        // --- API SETUP ---
        const apiKey = ""; // API Key injected by environment

        async function callGeminiAPI(prompt, systemInstruction = "You are a helpful study assistant.") {
            let effectiveKey = apiKey;
            if (!effectiveKey) {
                effectiveKey = localStorage.getItem('gemini_api_key');
            }

            if (!effectiveKey || !effectiveKey.trim()) {
                return "🚨 錯誤：請先點擊右上角 ⚙️ 設定您的 API Key。";
            }

            try {
                // 1. 自動清除金鑰前後不小心多複製到的空白字元 (非常常見的 Bug)
                effectiveKey = effectiveKey.trim();

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${effectiveKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    }
                );

                if (!response.ok) {
                    // 2. 抓取伺服器真正回傳的錯誤原因
                    const errorData = await response.json().catch(() => ({}));
                    console.error("API Error Details:", errorData);

                    const errorMessage = errorData?.error?.message || `HTTP ${response.status}`;

                    // 3. 針對常見的錯誤給予明確的介面提示
                    if (errorMessage.includes("User location is not supported")) {
                        return `🚨 區域限制錯誤：Gemini API 目前封鎖了來自香港的直接連線。請開啟 VPN 切換至其他地區（如台灣、美國）後再試一次。`;
                    } else if (response.status === 400) {
                        return `🚨 請求格式錯誤 (400)：請確認金鑰是否正確。詳細原因：${errorMessage}`;
                    } else if (response.status === 403) {
                        return `🚨 權限拒絕 (403)：API 金鑰無效。詳細原因：${errorMessage}`;
                    }

                    return `🚨 伺服器錯誤：${errorMessage}`;
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI 沒有回傳任何內容。";
            } catch (error) {
                console.error("Gemini API Error:", error);
                return `🚨 網路連線錯誤：無法連接到 Google 伺服器 (${error.message})。請檢查網路或 VPN 狀態。`;
            }
        }

        async function callDeepseekAPI(prompt, systemInstruction = "You are a helpful study assistant.") {
            let effectiveKey = localStorage.getItem('deepseek_api_key');

            if (!effectiveKey || !effectiveKey.trim()) {
                return "🚨 錯誤：請先點擊右上角 ⚙️ 設定您的 Deepseek API Key。";
            }

            try {
                effectiveKey = effectiveKey.trim();

                // Deepseek API 端點
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${effectiveKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 使用 Deepseek V3 模型 (若要 R1 推理模型可改為 deepseek-reasoner)
                        messages: [
                            { role: "system", content: systemInstruction },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error("Deepseek API Error:", errorData);
                    return `🚨 API 錯誤：${errorData.error?.message || response.statusText}`;
                }

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "AI 沒有回傳任何內容。";
            } catch (error) {
                console.error("Deepseek API Error:", error);
                return `🚨 網路連線錯誤：無法連接到 Deepseek 伺服器 (${error.message})。`;
            }
        }

            Users: (props) => <Icon {...props} path={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>} />,
            LogOut: (props) => <Icon {...props} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></>} />,
            CheckSquare: (props) => <Icon {...props} path={<><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></>} />,
            Calendar: (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></>} />,
            Trash: (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></>} />,
            Cloud: (props) => <Icon {...props} path={<><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></>} />,
            MapPin: (props) => <Icon {...props} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></>} />,
        };

        // --- New AI Components ---
        // AI Assistant Module (包含 Character AI 功能)
        const AIAssistantModule = ({ isOpen, onClose, language }) => {
            // === 對話與模式狀態 ===
            const [localMessages, setLocalMessages] = useState([]);
            const [geminiMessages, setGeminiMessages] = useState([]);
            const [deepseekMessages, setDeepseekMessages] = useState([]);
            const [openRouterMessages, setOpenRouterMessages] = useState([]);

            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [aiMode, setAiMode] = useState('local');

            // === 金鑰與設定狀態 ===
            const [apiKey, setApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [isSaved, setIsSaved] = useState(false);

            // === 本地模型狀態 ===
            const [localModels, setLocalModels] = useState([]);
            const [selectedLocalModel, setSelectedLocalModel] = useState('');
            const [isModelLoading, setIsModelLoading] = useState(false);

            // === 🎭 Character AI 專屬狀態 ===
            const DEFAULT_CHARACTER = {
                id: 'default',
                name: t('Default AI Assistant', language),
                icon: '🤖',
                tagline: t('Your Personal All-Purpose Assistant', language),
                description: t('You are the user\'s personal AI assistant.', language),
                greeting: t('What would you like to talk about today?', language),
                isDefault: true // 標記為預設，禁止編輯與刪除
            };

            const [view, setView] = useState('chat');
            const [characters, setCharacters] = useState(() => JSON.parse(localStorage.getItem('ai_characters') || '[]'));
            const [activeCharacter, setActiveCharacter] = useState(DEFAULT_CHARACTER); // 初始值改為預設助理
            const [editingChar, setEditingChar] = useState({ id: '', name: '', icon: '🤖', tagline: '', description: '', greeting: '' });

            // 合併預設角色與自訂角色陣列，供列表渲染使用
            const allCharacters = [DEFAULT_CHARACTER, ...characters];

            // 自動儲存角色到 LocalStorage
            useEffect(() => {
                localStorage.setItem('ai_characters', JSON.stringify(characters));
            }, [characters]);

            // 切換金鑰顯示
            useEffect(() => {
                if (aiMode === 'gemini') setApiKey(localStorage.getItem('gemini_api_key') || '');
                else if (aiMode === 'deepseek') setApiKey(localStorage.getItem('deepseek_api_key') || '');
                else if (aiMode === 'openrouter') setApiKey(localStorage.getItem('openrouter_api_key') || '');
            }, [aiMode]);

            // 載入本地模型列表
            useEffect(() => {
                if (window.electronAPI && window.electronAPI.getLocalModels) {
                    window.electronAPI.getLocalModels().then(models => {
                        setLocalModels(models);
                        if (models.length > 0) setSelectedLocalModel(models[0]);
                    });
                }
            }, []);

            const handleConfirmKey = () => {
                if (!apiKey.trim()) return alert("請輸入有效的 API Key");
                if (aiMode === 'gemini') localStorage.setItem('gemini_api_key', apiKey);
                else if (aiMode === 'deepseek') localStorage.setItem('deepseek_api_key', apiKey);
                else if (aiMode === 'openrouter') localStorage.setItem('openrouter_api_key', apiKey);
                setIsSaved(true);
                setTimeout(() => { setShowSettings(false); setIsSaved(false); }, 1000);
            };

            const handleLocalModelChange = async (e) => {
                const filename = e.target.value;
                setSelectedLocalModel(filename);
                if (window.electronAPI && window.electronAPI.loadLocalModel) {
                    setIsModelLoading(true);
                    setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `⏳ 正在為您切換至 \`${filename}\` 模型...` }]);
                    const result = await window.electronAPI.loadLocalModel(filename);
                    if (result.ok) setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `✅ 成功切換至 \`${filename}\`！` }]);
                    else setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `❌ 載入失敗：${result.error}` }]);
                    setIsModelLoading(false);
                }
            };

            // 取得當前對話陣列
            let currentMessages, setCurrentMessages;
            if (aiMode === 'local') { currentMessages = localMessages; setCurrentMessages = setLocalMessages; }
            else if (aiMode === 'gemini') { currentMessages = geminiMessages; setCurrentMessages = setGeminiMessages; }
            else if (aiMode === 'deepseek') { currentMessages = deepseekMessages; setCurrentMessages = setDeepseekMessages; }
            else { currentMessages = openRouterMessages; setCurrentMessages = setOpenRouterMessages; }

            const messagesEndRef = useRef(null);
            useEffect(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), [currentMessages, loading, view]);

            const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(e); } };

            // === 🎭 角色扮演核心邏輯 ===
            const handleSelectCharacter = (char) => {
                setActiveCharacter(char);
                setView('chat');

                // 【修復 Bug】：徹底清空所有模式的歷史對話，確保不會有舊對話殘留
                const greetingMsg = { id: Date.now(), role: 'ai', text: char.greeting || `你好！我是 ${char.name}。` };
                setLocalMessages([greetingMsg]);
                setGeminiMessages([greetingMsg]);
                setDeepseekMessages([greetingMsg]);
                setOpenRouterMessages([greetingMsg]);
            };

            const handleSaveCharacter = () => {
                if (!editingChar.name.trim() || !editingChar.description.trim()) return alert(t('Please at least fill in Character Name and System Prompt!', language));
                if (editingChar.id === 'default') return alert(t('Cannot edit default assistant!', language));

                if (editingChar.id) {
                    setCharacters(prev => prev.map(c => c.id === editingChar.id ? editingChar : c));
                } else {
                    setCharacters(prev => [{ ...editingChar, id: Date.now().toString() }, ...prev]);
                }
                setView('character-list');
            };

            const handleDeleteCharacter = (id, e) => {
                e.stopPropagation();
                if (id === 'default') return; // 防呆：禁止刪除預設角色

                if (confirm(t('Are you sure you want to delete this character?', language))) {
                    setCharacters(prev => prev.filter(c => c.id !== id));

                    // 如果刪除的是當前正在聊天的角色，自動切換回預設助理並清空對話
                    if (activeCharacter?.id === id) {
                        handleSelectCharacter(DEFAULT_CHARACTER);
                    }
                }
            };

            // === 發送訊息邏輯 ===
            const handleSend = async (e) => {
                e?.preventDefault();
                if (!input.trim() || loading || isModelLoading) return;

                if (aiMode !== 'local' && !apiKey.trim()) {
                    alert(t('Please input your API key!', language));
                    setShowSettings(true);
                    return;
                }

                const userMsg = { id: Date.now(), role: 'user', text: input.trim() };
                setCurrentMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                let aiResponseText = t('AI temporarily unavailable.', language);

                // 核心：根據是否有選擇角色，決定系統提示詞 (System Prompt)
                const defaultSystemPrompt = t('You are the user\'s专属 AI assistant.', language);
                const systemPromptToUse = activeCharacter ? activeCharacter.description : defaultSystemPrompt;

                try {
                    if (aiMode === 'local') {
                        if (window.electronAPI && window.electronAPI.chatWithLocalAI) {
                            // 本地模型透過字串組合注入 System Prompt
                            const promptToSend = `System: ${systemPromptToUse}\nUser: ${userMsg.text}\nAssistant:`;
                            aiResponseText = await window.electronAPI.chatWithLocalAI(promptToSend);
                        }
                    } else if (aiMode === 'gemini') {
                        aiResponseText = await callGeminiAPI(userMsg.text, systemPromptToUse);
                    } else if (aiMode === 'deepseek') {
                        aiResponseText = await callDeepseekAPI(userMsg.text, systemPromptToUse);
                    } else if (aiMode === 'openrouter') {
                        aiResponseText = await callOpenRouterAPI(userMsg.text, systemPromptToUse);
                    }
                } catch (error) {
                    aiResponseText = `發生錯誤：${error.message}`;
                }

                setCurrentMessages(prev => [...prev, { id: Date.now() + 1, role: 'ai', text: aiResponseText }]);
                setLoading(false);
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm animate-fade-in">
                    <div className="w-[500px] h-[650px] bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden relative">

                        {/* === 標題列 === */}
                        <div className="h-16 border-b border-gray-200/60 flex items-center justify-between px-5 bg-white/50">
                            <div className="flex items-center gap-3">
                                {/* 返回按鈕 (如果在角色介面) */}
                                {view !== 'chat' ? (
                                    <button onClick={() => setView('chat')} className="p-2 hover:bg-gray-100 rounded-full text-gray-500 transition-colors">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                                    </button>
                                ) : (
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-100 to-indigo-100 flex items-center justify-center text-xl shadow-sm cursor-pointer overflow-hidden" onClick={() => handleSelectCharacter(DEFAULT_CHARACTER)} title="點擊切換回預設助理">
                                        {activeCharacter.icon?.startsWith('data:image')
                                            ? <img src={activeCharacter.icon} className="w-full h-full object-cover" alt="avatar" />
                                            : activeCharacter.icon}
                                    </div>
                                )}

                                <div className="flex flex-col">
                                    <div className="font-bold text-gray-800 tracking-tight flex items-center gap-2">
                                        {view === 'chat' ? activeCharacter.name : '🎭 ' + t('Character Hub', language)}
                                        {activeCharacter.id !== 'default' && view === 'chat' && <span className="text-[10px] bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full">{t('Roleplaying', language)}</span>}
                                    </div>

                                    {/* 隱藏模型選單，如果不在聊天介面 */}
                                    {view === 'chat' && (
                                        <div className="flex items-center gap-2">
                                            <select value={aiMode} onChange={(e) => setAiMode(e.target.value)} className="text-xs font-medium bg-transparent text-gray-500 outline-none hover:text-purple-600 cursor-pointer">
                                                <option value="local">local models</option>
                                                <option value="gemini">Gemini</option>
                                                <option value="deepseek">Deepseek</option>
                                                <option value="openrouter">Trinity (free)</option>
                                            </select>
                                            {aiMode === 'local' && localModels.length > 0 && (
                                                <select value={selectedLocalModel} onChange={handleLocalModelChange} className="text-xs text-purple-500 bg-transparent outline-none max-w-[100px] truncate" disabled={isModelLoading}>
                                                    {localModels.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex gap-1">
                                {/* 進入角色列表按鈕 */}
                                {view === 'chat' && (
                                    <button onClick={() => setView('character-list')} className="p-2 hover:bg-purple-50 hover:text-purple-600 rounded-full text-gray-500 transition-colors" title="自訂角色">
                                        🎭
                                    </button>
                                )}
                                {view === 'chat' && aiMode !== 'local' && (
                                    <button onClick={() => setShowSettings(!showSettings)} className="text-sm font-bold text-purple-600 hover:text-purple-800 transition-colors px-3 py-1 bg-purple-50 rounded-lg mr-2">
                                        {t('API Key', language)}
                                    </button>
                                )}
                                <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full text-gray-500"><Icons.X className="w-5 h-5" /></button>
                            </div>
                        </div>

                        {/* API 設定區塊 (僅在 Chat 模式顯示) */}
                        {view === 'chat' && showSettings && aiMode !== 'local' && (
                            <div className="p-4 bg-gray-50 border-b border-gray-200/60 text-sm flex gap-2 shadow-inner">
                                <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); setIsSaved(false); }} placeholder="輸入 API Key..." className="flex-1 p-2 border border-gray-300 rounded-lg outline-none focus:border-purple-500" />
                                <button onClick={handleConfirmKey} className={`px-4 py-2 rounded-lg font-bold text-white ${isSaved ? 'bg-green-500' : 'bg-gray-800'}`}>{isSaved ? '✓' : '確認'}</button>
                            </div>
                        )}

                        {/* === 主要內容區 === */}
                        <div className="flex-1 overflow-y-auto bg-gray-50/30 relative">

                            {/* 1. 聊天介面 */}
                            {view === 'chat' && (
                                <div className="p-5 space-y-6">
                                    {currentMessages.length <= 1 && activeCharacter.id === 'default' && (
                                        <div className="text-center pt-8 animate-fade-in pb-6 border-b border-gray-100 mb-6">
                                            <div className="text-4xl mb-4">🤖</div>
                                            <h3 className="text-xl font-bold text-gray-800">{t('What do you want to chat about today?', language)}</h3>
                                            <p className="text-gray-500 text-sm mt-2 mb-6">{t('I am your personal AI assistant. Click 🎭 in the top right to create custom characters!', language)}</p>

                                            <div className="flex flex-col gap-2 w-full max-w-[300px] mx-auto">
                                                <button onClick={() => { setInput('Please help me create a D&D 5E character backstory.'); }} className="p-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 hover:border-purple-300 hover:text-purple-600 transition-all text-left flex items-center gap-3">
                                                    <span className="text-lg">🐉</span> D&D Character Creation
                                                </button>
                                                <button onClick={() => { setInput('Please teach me how to run local open-source AI models on Windows.'); }} className="p-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 hover:border-purple-300 hover:text-purple-600 transition-all text-left flex items-center gap-3">
                                                    <span className="text-lg">💻</span> Run Local AI
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {currentMessages.map(msg => (
                                        <div key={msg.id} className={`flex gap-3 ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-slide-up`}>
                                            {msg.role === 'ai' && (
                                                <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center flex-shrink-0 mt-1 shadow-sm text-sm overflow-hidden">
                                                    {activeCharacter ? (
                                                        activeCharacter.icon?.startsWith('data:image')
                                                            ? <img src={activeCharacter.icon} className="w-full h-full object-cover" alt="avatar" />
                                                            : activeCharacter.icon
                                                    ) : <Icons.Bot className="w-4 h-4 text-white" />}
                                                </div>
                                            )}
                                            <div className={`max-w-[75%] px-5 py-3.5 text-sm shadow-sm ${msg.role === 'user' ? 'bg-purple-600 text-white rounded-2xl rounded-br-sm' : 'bg-white text-gray-800 border border-gray-100 rounded-2xl rounded-bl-sm leading-relaxed'}`}>
                                                {msg.role === 'ai' && typeof marked !== 'undefined' ? (
                                                    <div className="prose prose-sm prose-p:my-1 prose-pre:bg-gray-800 prose-pre:text-gray-100 prose-pre:rounded-xl" dangerouslySetInnerHTML={{ __html: marked.parse(msg.text) }} />
                                                ) : <div className="whitespace-pre-wrap">{msg.text}</div>}
                                            </div>
                                        </div>
                                    ))}
                                    {loading && (
                                        <div className="flex justify-start gap-3 animate-fade-in">
                                            <div className="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center mt-1"><div className="w-2 h-2 bg-white rounded-full animate-ping"></div></div>
                                            <div className="bg-white px-5 py-4 rounded-2xl rounded-bl-sm shadow-sm border flex gap-1.5 items-center"><div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div><div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-100"></div><div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-200"></div></div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}

                            {/* 2. 角色列表介面 */}
                            {view === 'character-list' && (
                                <div className="p-5">
                                    <button onClick={() => { setEditingChar({ id: '', name: '', icon: '👻', tagline: '', description: 'You are a...', greeting: 'Hello!' }); setView('character-edit'); }} className="w-full py-4 border-2 border-dashed border-purple-300 rounded-2xl text-purple-600 font-bold hover:bg-purple-50 hover:border-purple-500 transition-all flex justify-center items-center gap-2 mb-4">
                                        <span>{t('+ Create New Character', language)}</span>
                                    </button>

                                    <div className="grid grid-cols-2 gap-3">
                                        {allCharacters.map(char => (
                                            <div key={char.id} onClick={() => handleSelectCharacter(char)} className={`bg-white border ${activeCharacter.id === char.id ? 'border-purple-500 ring-2 ring-purple-100' : 'border-gray-200'} rounded-2xl p-4 cursor-pointer hover:shadow-md hover:border-purple-300 transition-all group relative`}>
                                                {/* 隱藏預設角色的刪除按鈕 */}
                                                {!char.isDefault && (
                                                    <button onClick={(e) => handleDeleteCharacter(char.id, e)} className="absolute top-2 right-2 w-6 h-6 bg-red-100 text-red-600 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-xs" title="刪除">✕</button>
                                                )}
                                                <div className="w-14 h-14 mx-auto mb-2 rounded-full overflow-hidden bg-gray-100 flex items-center justify-center text-3xl">
                                                    {char.icon?.startsWith('data:image') ? <img src={char.icon} className="w-full h-full object-cover" alt="avatar" /> : char.icon}
                                                </div>
                                                <div className="font-bold text-gray-800 truncate">{char.name}</div>
                                                <div className="text-xs text-gray-500 truncate mt-1">{char.tagline}</div>
                                            </div>
                                        ))}
                                        {characters.length === 0 && <div className="col-span-2 text-center text-gray-400 text-sm py-10">{t('No characters created yet', language)}</div>}
                                    </div>
                                </div>
                            )}

                            {/* 3. 建立/編輯角色介面 */}
                            {view === 'character-edit' && (
                                <div className="p-5 flex flex-col gap-4 animate-slide-up">
                                    <div className="flex gap-4">
                                        <div className="flex-1"><label className="text-xs font-bold text-gray-500 mb-1 block">{t('Character Name', language)}</label><input value={editingChar.name} onChange={e => setEditingChar({ ...editingChar, name: e.target.value })} placeholder="例：蘇格拉底" className="w-full p-2.5 bg-gray-100 border-transparent rounded-xl focus:bg-white focus:border-purple-500 outline-none border transition-all" /></div>
                                        <div className="w-24">
                                            <label className="text-xs font-bold text-gray-500 mb-1 block text-center">{t('Custom Avatar', language)}</label>
                                            <div className="relative w-12 h-12 mx-auto rounded-full border border-purple-200 bg-purple-50 flex items-center justify-center cursor-pointer overflow-hidden shadow-sm hover:bg-purple-100 transition-colors">
                                                <input
                                                    type="file"
                                                    accept="image/*"
                                                    className="absolute inset-0 opacity-0 cursor-pointer z-10"
                                                    onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if (file) {
                                                            const reader = new FileReader();
                                                            reader.onloadend = () => setEditingChar({ ...editingChar, icon: reader.result });
                                                            reader.readAsDataURL(file);
                                                        }
                                                    }}
                                                />
                                                {editingChar.icon?.startsWith('data:image') ? (
                                                    <img src={editingChar.icon} className="w-full h-full object-cover" alt="avatar" />
                                                ) : (
                                                    <span className="text-2xl">{editingChar.icon || '➕'}</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    <div><label className="text-xs font-bold text-gray-500 mb-1 block">{t('Tagline', language)}</label><input value={editingChar.tagline} onChange={e => setEditingChar({ ...editingChar, tagline: e.target.value })} placeholder="例：古希臘的哲學導師" className="w-full p-2.5 bg-gray-100 border-transparent rounded-xl focus:bg-white focus:border-purple-500 outline-none border transition-all" /></div>
                                    <div><label className="text-xs font-bold text-gray-500 mb-1 block">{t('Greeting', language)}</label><input value={editingChar.greeting} onChange={e => setEditingChar({ ...editingChar, greeting: e.target.value })} placeholder="例：年輕人，你認為什麼是「智慧」？" className="w-full p-2.5 bg-gray-100 border-transparent rounded-xl focus:bg-white focus:border-purple-500 outline-none border transition-all" /></div>
                                    <div className="flex-1"><label className="text-xs font-bold text-gray-500 mb-1 block">{t('System Prompt', language)} - {t('Determine how the AI will play the role', language)}</label><textarea value={editingChar.description} onChange={e => setEditingChar({ ...editingChar, description: e.target.value })} placeholder="You are Socrates. You never give direct answers, but ask guiding questions (Socratic method)..." className="w-full h-[150px] p-2.5 bg-gray-100 border-transparent rounded-xl focus:bg-white focus:border-purple-500 outline-none border transition-all resize-none" /></div>
                                    <button onClick={handleSaveCharacter} className="w-full py-3 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition-colors mt-2">{t('Save Character', language)}</button>

        // Bookmarks Module
        const BookmarksModule = ({ isOpen, onClose, onNavigate, language }) => {
            const [bookmarks, setBookmarks] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(false);


            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        // 从 LocalStorage 读取
                        const saved = localStorage.getItem(getStorageKey('my_bookmarks')); // 注意保持 key 一致
                        const data = saved ? JSON.parse(saved) : [];
                        setBookmarks(data);
                    } catch (e) {
                        console.error(e);
                        setBookmarks([]);
                    }
                    setLoading(false);
                }
            }, [isOpen]);

            const handleRemoveBookmark = (url) => {
                try {
                    // 1. 获取当前所有书签 / Get current bookmarks
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    const currentBookmarks = saved ? JSON.parse(saved) : [];

                    // 2. 过滤掉要删除的那个 URL / Filter out the URL to remove
                    const updatedBookmarks = currentBookmarks.filter(b => b.url !== url);

                    // 3. 保存回 localStorage / Save back to localStorage
                    localStorage.setItem(getStorageKey('my_bookmarks'), JSON.stringify(updatedBookmarks));

                    // 4. 更新当前列表状态 (让界面立即刷新) / Update state (Refresh UI immediately)
                    setBookmarks(updatedBookmarks);

                    // 5. 提示成功 / Show success message
                    showToast('Bookmark removed', 'success');

        // Pomodoro Module
        const PomodoroModule = ({ isOpen, onClose, language }) => {
            const [timeLeft, setTimeLeft] = useState(25 * 60); // 25 minutes in seconds
            const [isActive, setIsActive] = useState(false);
            const [mode, setMode] = useState('work'); // 'work', 'shortBreak', 'longBreak'
            const [cycles, setCycles] = useState(0);
            const intervalRef = useRef(null);

            const modes = {
                work: { time: 25 * 60, label: 'Work Time', color: 'bg-red-500' },
                shortBreak: { time: 5 * 60, label: 'Short Break', color: 'bg-green-500' },
                longBreak: { time: 15 * 60, label: 'Long Break', color: 'bg-blue-500' }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const startTimer = () => {
                setIsActive(true);
                intervalRef.current = setInterval(() => {
                    setTimeLeft(time => {
                        if (time <= 1) {
                            clearInterval(intervalRef.current);
                            setIsActive(false);
                            handleTimerComplete();
                            return 0;
                        }
                        return time - 1;
                    });
                }, 1000);
            };

            const pauseTimer = () => {
                setIsActive(false);
                clearInterval(intervalRef.current);
            };

            const resetTimer = () => {
                setIsActive(false);
                clearInterval(intervalRef.current);
                setTimeLeft(modes[mode].time);
            };

            const handleTimerComplete = () => {
                if (mode === 'work') {
                    const newCycles = cycles + 1;
                    setCycles(newCycles);
                    if (newCycles % 4 === 0) {
                        setMode('longBreak');
                        setTimeLeft(modes.longBreak.time);
                    } else {
                        setMode('shortBreak');
                        setTimeLeft(modes.shortBreak.time);
                    }
                } else {
                    setMode('work');
                    setTimeLeft(modes.work.time);
                }
            };

            const switchMode = (newMode) => {
                setMode(newMode);
                setTimeLeft(modes[newMode].time);
                setIsActive(false);
                clearInterval(intervalRef.current);
            };

            useEffect(() => {
                return () => clearInterval(intervalRef.current);
            }, []);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm animate-fade-in">
                    <div className="w-[400px] h-[500px] bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden animate-slide-up">
                        <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-4 bg-white/50">

                                <span className="font-semibold text-gray-700">{t('Pomodoro Timer', language)}</span>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200/50 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center p-6">
                            <div className="text-center mb-8">
                                <div className={`w-48 h-48 rounded-full ${modes[mode].color} flex items-center justify-center mb-4 shadow-lg`}>
                                    <span className="text-4xl font-bold text-white">{formatTime(timeLeft)}</span>
                                </div>
                                <h3 className="text-xl font-semibold text-gray-700 mb-2">{t(modes[mode].label, language)}</h3>
                                <p className="text-sm text-gray-500">{t('Completed cycles:', language)}{cycles}</p>
                            </div>
                            <div className="flex gap-3 mb-6">
                                <button
                                    onClick={() => switchMode('work')}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium ${mode === 'work' ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-700'}`}
                                >
                                    {t('Work', language)}
                                </button>
                                <button
                                    onClick={() => switchMode('shortBreak')}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium ${mode === 'shortBreak' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-700'}`}
                                >
                                    {t('Short Break', language)}
                                </button>
                                <button
                                    onClick={() => switchMode('longBreak')}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium ${mode === 'longBreak' ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700'}`}
                                >
                                    {t('Long Break', language)}
                                </button>
                            </div>
                            <div className="flex gap-3">
                                {!isActive ? (
                                    <button onClick={startTimer} className="px-6 py-3 bg-green-500 text-white rounded-lg font-medium hover:bg-green-600 transition-colors">
                                        {t('Start', language)}
                                    </button>
                                ) : (
                                    <button onClick={pauseTimer} className="px-6 py-3 bg-yellow-500 text-white rounded-lg font-medium hover:bg-yellow-600 transition-colors">
                                        {t('Pause', language)}
                                    </button>
                                )}
                                <button onClick={resetTimer} className="px-6 py-3 bg-gray-500 text-white rounded-lg font-medium hover:bg-gray-600 transition-colors">
                                    {t('Reset', language)}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Todo List Module
        const TodoListModule = ({ isOpen, onClose, language }) => {
            const [todos, setTodos] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        const saved = localStorage.getItem(getStorageKey('anechoic_todos'));
                        const data = saved ? JSON.parse(saved) : [];
                        setTodos(data);
                    } catch (e) {
                        console.error(e);
                        setTodos([]);
                    }
                    setLoading(false);
                }
            }, [isOpen]);

            const saveTodos = (newTodos) => {
                localStorage.setItem(getStorageKey('anechoic_todos'), JSON.stringify(newTodos));
                setTodos(newTodos);
            };

            const addTodo = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                const newTodo = { id: Date.now(), text: input.trim(), completed: false };
                const newTodos = [...todos, newTodo];
                saveTodos(newTodos);
                setInput('');
                showToast('Task added', 'success');
            };

            const toggleTodo = (id) => {
                const newTodos = todos.map(todo =>
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                );
                saveTodos(newTodos);
            };

            const deleteTodo = (id) => {
                const newTodos = todos.filter(todo => todo.id !== id);
                saveTodos(newTodos);
                showToast('Task deleted', 'success');
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm animate-fade-in">
                    <div className="w-[500px] h-[600px] bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden animate-slide-up">
                        <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-4 bg-white/50">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-pink-100 flex items-center justify-center text-pink-600"><Icons.CheckSquare className="w-5 h-5" /></div>
                                <span className="font-semibold text-gray-700">{t('Todo List', language)}</span>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200/50 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="p-4 border-b border-gray-200/50">
                            <form onSubmit={addTodo} className="flex gap-2">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder={t('Add a new task...', language)}
                                    className="flex-1 bg-gray-100/50 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-500"
                                />
                                <button type="submit" disabled={!input.trim()} className="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"><Icons.Plus className="w-4 h-4" /></button>
                            </form>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {loading ? (
                                <div className="text-center text-gray-500 py-8">{t('Loading todos...', language)}</div>
                            ) : todos.length === 0 ? (
                                <div className="text-center text-gray-500 py-8">{t('No tasks yet. Add one above!', language)}</div>
                            ) : (
                                todos.map((todo) => (
                                    <div key={todo.id} className="flex items-center gap-3 p-3 bg-gray-50/50 rounded-lg hover:bg-gray-100/50 transition-colors group">
                                        <button
                                            onClick={() => toggleTodo(todo.id)}
                                            className={`w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${todo.completed
                                                ? 'bg-pink-500 border-pink-500 text-white'
                                                : 'border-gray-300 hover:border-pink-400'
                                                }`}
                                        >
                                            {todo.completed && <Icons.CheckSquare className="w-3 h-3" />}
                                        </button>
                                        <span className={`flex-1 text-sm ${todo.completed ? 'line-through text-gray-500' : 'text-gray-700'}`}>
                                            {todo.text}
                                        </span>
                                        <button
                                            onClick={() => deleteTodo(todo.id)}
                                            className="p-1 opacity-0 group-hover:opacity-100 hover:bg-red-100 rounded transition-all text-red-500"
                                            title="Delete task"
                                        >
                                            <Icons.Trash className="w-4 h-4" />
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Schedule Module
        const ScheduleModule = ({ isOpen, onClose, language }) => {
            const [schedule, setSchedule] = useState([]);
            const [input, setInput] = useState({ day: 'Monday', time: '', subject: '', room: '' });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        const saved = localStorage.getItem(getStorageKey('anechoic_schedule'));
                        const data = saved ? JSON.parse(saved) : [];
                        setSchedule(data);
                    } catch (e) {
                        console.error(e);
                        setSchedule([]);
                    }
                    setLoading(false);
                }
            }, [isOpen]);

            const saveSchedule = (newSchedule) => {
                localStorage.setItem(getStorageKey('anechoic_schedule'), JSON.stringify(newSchedule));
                setSchedule(newSchedule);
            };

            const addClass = (e) => {
                e.preventDefault();
                if (!input.time.trim() || !input.subject.trim()) return;
                const newClass = { id: Date.now(), ...input };
                const newSchedule = [...schedule, newClass];
                saveSchedule(newSchedule);
                setInput({ day: 'Monday', time: '', subject: '', room: '' });
                showToast('Class added', 'success');
            };

            const deleteClass = (id) => {
                const newSchedule = schedule.filter(cls => cls.id !== id);
                saveSchedule(newSchedule);
                showToast('Class deleted', 'success');
            };

            const groupedSchedule = schedule.reduce((acc, cls) => {
                if (!acc[cls.day]) acc[cls.day] = [];
                acc[cls.day].push(cls);
                return acc;
            }, {});

            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm animate-fade-in">
                    <div className="w-[600px] h-[700px] bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden animate-slide-up">
                        <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-4 bg-white/50">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600"><Icons.Calendar className="w-5 h-5" /></div>
                                <span className="font-semibold text-gray-700">{t('Student Schedule', language)}</span>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200/50 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                        </div>
                        <div className="p-4 border-b border-gray-200/50">
                            <form onSubmit={addClass} className="grid grid-cols-2 gap-3">
                                <select
                                    value={input.day}
                                    onChange={(e) => setInput({ ...input, day: e.target.value })}
                                    className="bg-gray-100/50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                >
                                    {days.map(day => <option key={day} value={day}>{t(day, language)}</option>)}
                                </select>
                                <input
                                    type="text"
                                    value={input.time}
                                    onChange={(e) => setInput({ ...input, time: e.target.value })}
                                    placeholder={t('Time (e.g., 9:00 AM)', language)}
                                    className="bg-gray-100/50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                                <input
                                    type="text"
                                    value={input.subject}
                                    onChange={(e) => setInput({ ...input, subject: e.target.value })}
                                    placeholder={t('Subject', language)}
                                    className="bg-gray-100/50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                                <div className="flex gap-2">
                                    <input
                                        type="text"
                                        value={input.room}
                                        onChange={(e) => setInput({ ...input, room: e.target.value })}
                                        placeholder={t('Room (optional)', language)}
                                        className="flex-1 bg-gray-100/50 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                    />
                                    <button type="submit" disabled={!input.time.trim() || !input.subject.trim()} className="px-3 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"><Icons.Plus className="w-4 h-4" /></button>
                                </div>
                            </form>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {loading ? (
                                <div className="text-center text-gray-500 py-8">{t('Loading schedule...', language)}</div>
                            ) : Object.keys(groupedSchedule).length === 0 ? (
                                <div className="text-center text-gray-500 py-8">{t('No classes scheduled. Add one above!', language)}</div>
                            ) : (
                                days.map(day => (
                                    groupedSchedule[day] && (
                                        <div key={day} className="space-y-2">
                                            <h3 className="font-semibold text-gray-700 text-sm uppercase tracking-wider">{t(day, language)}</h3>
                                            {groupedSchedule[day].map((cls) => (
                                                <div key={cls.id} className="flex items-center justify-between p-3 bg-gray-50/50 rounded-lg hover:bg-gray-100/50 transition-colors group">
                                                    <div className="flex-1">
                                                        <div className="text-sm font-medium text-gray-700">{cls.subject}</div>
                                                        <div className="text-xs text-gray-500">{cls.time} {cls.room && `• ${cls.room}`}</div>
                                                    </div>
                                                    <button
                                                        onClick={() => deleteClass(cls.id)}
                                                        className="p-1 opacity-0 group-hover:opacity-100 hover:bg-red-100 rounded transition-all text-red-500"
                                                        title="Delete class"
                                                    >
                                                        <Icons.Trash className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Weather Module (with autocomplete dropdown)
        const WeatherModule = ({ isOpen, onClose, language }) => {
        const [city, setCity] = useState('');
        const [weather, setWeather] = useState(null);
        const [loading, setLoading] = useState(false);
        const [suggestions, setSuggestions] = useState([]);
        const [showSuggestions, setShowSuggestions] = useState(false);
        const [fetchTimer, setFetchTimer] = useState(null);

        const getWeatherDescription = (code) => {
            const codes = {
            0: 'Clear sky',
            1: 'Mainly clear',
            2: 'Partly cloudy',
            3: 'Overcast',
            45: 'Fog',
            48: 'Rime fog',
            51: 'Light drizzle',
            53: 'Moderate drizzle',
            55: 'Dense drizzle',
            61: 'Slight rain',
            63: 'Moderate rain',
            65: 'Heavy rain',
            71: 'Slight snow',
            73: 'Moderate snow',
            75: 'Heavy snow',
            77: 'Snow grains',
            80: 'Slight rain showers',
            81: 'Moderate rain showers',
            82: 'Violent rain showers',
            85: 'Slight snow showers',
            86: 'Heavy snow showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm with hail',
            99: 'Thunderstorm with heavy hail'
            };
            return codes[code] || 'Unknown';
        };

        const fetchCitySuggestions = async (query) => {
            if (!query.trim()) {
                setSuggestions([]);
                return;
            }
            try {
                const response = await fetch(
                `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`
                );
                const data = await response.json();
                if (data.results) {
                const uniqueMap = new Map();
                data.results.forEach(item => {
                    const key = `${item.name}|${item.admin1 || ''}|${item.country}`;
                    if (!uniqueMap.has(key)) {
                    uniqueMap.set(key, item);
                    }
                });
                const uniqueResults = Array.from(uniqueMap.values());
                setSuggestions(uniqueResults.map(item => ({
                    name: item.name,
                    country: item.country,
                    admin1: item.admin1,
                    latitude: item.latitude,
                    longitude: item.longitude
                })));
                } else {
                setSuggestions([]);
                }
            } catch (error) {
                console.error('Failed to fetch suggestions:', error);
                setSuggestions([]);
            }
        };

        const handleInputChange = (e) => {
            const value = e.target.value;
            setCity(value);
            setShowSuggestions(true);

            if (fetchTimer) clearTimeout(fetchTimer);
            const timer = setTimeout(() => {
            fetchCitySuggestions(value);
            }, 500);
            setFetchTimer(timer);
        };

        const selectSuggestion = (suggestion) => {
            setCity(suggestion.name);
            setShowSuggestions(false);
            if (fetchTimer) clearTimeout(fetchTimer);
            searchWeatherWithCoords(suggestion.latitude, suggestion.longitude, suggestion.name);
        };

        const searchWeatherWithCoords = async (lat, lon, name) => {
            setLoading(true);
            try {
            const weatherResponse = await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relative_humidity_2m,windspeed_10m`
            );
            const weatherData = await weatherResponse.json();

            setWeather({
                condition: getWeatherDescription(weatherData.current_weather.weathercode),
                temperature: Math.round(weatherData.current_weather.temperature),
                humidity: weatherData.hourly.relative_humidity_2m[0] || 50,
                windSpeed: Math.round(weatherData.current_weather.windspeed)
            });
            setCity(name);
            showToast(`Weather for ${name}`, 'success');
            } catch (error) {
            console.error('Weather fetch error:', error);
            showToast('Failed to fetch weather', 'error');
            } finally {
            setLoading(false);
            }
        };

        const searchWeather = async (e) => {
            e.preventDefault();
            if (!city.trim()) return;

            setLoading(true);
            try {
            const geoResponse = await fetch(
                `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`
            );
            const geoData = await geoResponse.json();

            if (!geoData.results || geoData.results.length === 0) {
                showToast('City not found', 'error');
                setLoading(false);
                return;
            }

            const { latitude, longitude, name } = geoData.results[0];
            await searchWeatherWithCoords(latitude, longitude, name);
            } catch (error) {
            console.error('Weather fetch error:', error);
            showToast('Failed to fetch weather', 'error');
            setLoading(false);
            }
        };

        const handleBlur = () => {
            setTimeout(() => setShowSuggestions(false), 200);
        };

        if (!isOpen) return null;

        return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm animate-fade-in">
            <div className="w-[450px] h-[550px] bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 overflow-hidden animate-slide-up">
                <div className="h-14 border-b border-gray-200/50 flex items-center justify-between px-4 bg-white/50">
                <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-cyan-100 flex items-center justify-center text-cyan-600"><Icons.Cloud className="w-5 h-5" /></div>
                    <span className="font-semibold text-gray-700">{t('Weather', language)}</span>
                </div>
                <button onClick={onClose} className="p-2 hover:bg-gray-200/50 rounded-full transition-colors"><Icons.X className="w-5 h-5 text-gray-500" /></button>
                </div>
                <div className="p-4 border-b border-gray-200/50 relative">
                <form onSubmit={searchWeather} className="flex gap-2">
                    <div className="relative flex-1">
                    <Icons.MapPin className="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400" />
                    <input
                        type="text"
                        value={city}
                        onChange={handleInputChange}
                        onFocus={() => setShowSuggestions(true)}
                        onBlur={handleBlur}
                        placeholder={t('Enter city name...', language)}
                        className="w-full pl-10 pr-4 py-2 bg-gray-100/50 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
                    />
                    </div>
                    <button type="submit" disabled={loading || !city.trim()} className="px-4 py-2 bg-cyan-500 text-white rounded-lg hover:bg-cyan-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"><Icons.Search className="w-4 h-4" /></button>
                </form>
                {showSuggestions && suggestions.length > 0 && (
                    <ul className="absolute left-4 right-4 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto z-10">
                    {suggestions.map((s, idx) => (
                        <li
                        key={idx}
                        onClick={() => selectSuggestion(s)}
                        className="px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm flex items-center gap-2"
                        >
                        <Icons.MapPin className="w-3 h-3 text-gray-400" />
                        <span className="font-medium">{s.name}</span>
                        <span className="text-xs text-gray-500">{s.admin1 ? `${s.admin1}, ` : ''}{s.country}</span>
                        </li>
                    ))}
                    </ul>
                )}
                </div>
                <div className="flex-1 flex flex-col items-center justify-center p-6">
                {loading ? (
                    <div className="text-center">
                    <div className="w-16 h-16 border-4 border-cyan-200 border-t-cyan-500 rounded-full animate-spin mx-auto mb-4"></div>
                    <p className="text-gray-500">{t('Fetching weather...', language)}</p>
                    </div>
                ) : weather ? (
                    <div className="text-center">
                    <div className="w-32 h-32 bg-cyan-100 rounded-full flex items-center justify-center mb-6 mx-auto">
                        <Icons.Cloud className="w-16 h-16 text-cyan-600" />
                    </div>
                    <div className="text-6xl font-bold text-gray-800 mb-2">{weather.temperature}°C</div>
                    <div className="text-xl text-gray-600 mb-4">{weather.condition}</div>
                    <div className="text-sm text-gray-500 space-y-1">
                        <div>{t('Humidity', language)}: {weather.humidity}%</div>
                        <div>{t('Wind Speed', language)}: {weather.windSpeed} km/h</div>
                    </div>
                    </div>
                ) : (
                    <div className="text-center text-gray-500">
                    <Icons.Cloud className="w-16 h-16 mx-auto mb-4 text-gray-300" />
                    <p>{t('Enter a city name to get weather information', language)}</p>
                    </div>
                )}
                </div>
            </div>
            </div>
        );
        };
        // VPN Module
        // 1. Sidebar Component
        const Sidebar = ({ isOpen, toggle, mode, setMode, onOpenModule, isCustomTheme, themeColor, language }) => {
            const [activeItem, setActiveItem] = useState('history');

            // Define active color based on mode
            const activeColorClass = mode === 'learning' ? 'text-blue-700 bg-blue-100' : 'text-orange-700 bg-orange-100';
            const iconColorClass = mode === 'learning' ? 'text-blue-700' : 'text-orange-600';

            // Conditional styles for sidebar
            const sidebarClass = isCustomTheme ? '' : `${mode === 'learning'
                ? 'bg-[#F0F9FF]/90 border-blue-200'
                : 'bg-[#FFF7ED]/90 border-orange-200'}`;
            const sidebarStyle = isCustomTheme ? {
                backgroundColor: hexToRgba(themeColor, 0.9),
                borderColor: hexToRgba(themeColor, 0.2)
            } : {};

            return (
                <div
                    className={`flex flex-col h-full glass border-r transition-all duration-500 ease-in-out z-30 ${isOpen ? 'w-64' : 'w-16'} ${sidebarClass}`}
                    style={sidebarStyle}
                >
                    <div className="h-10 flex items-center justify-center border-b border-gray-200/30">
                        {isOpen ? <span className="font-bold text-lg tracking-tight text-gray-700">Anechoic</span> : <span className="font-bold text-xl">A</span>}
                    </div>

                    <div className="flex-1 py-4 flex flex-col gap-2 overflow-y-auto">
                        <SidebarItem icon={Icons.History} label={t('History', language)} isOpen={isOpen} active={activeItem === 'history'} onClick={() => { setActiveItem('history'); onOpenModule('history'); }} activeClass={activeColorClass} iconActive={iconColorClass} />
                        <SidebarItem icon={Icons.Bookmark} label={t('Bookmarks', language)} isOpen={isOpen} active={activeItem === 'bookmarks'} onClick={() => { setActiveItem('bookmarks'); onOpenModule('bookmarks'); }} activeClass={activeColorClass} iconActive={iconColorClass} />
                        <SidebarItem icon={Icons.Clock} label={t('Pomodoro', language)} isOpen={isOpen} active={activeItem === 'pomodoro'} onClick={() => { setActiveItem('pomodoro'); onOpenModule('pomodoro'); }} activeClass={activeColorClass} iconActive={iconColorClass} />
                        <SidebarItem icon={Icons.CheckSquare} label={t('Todo List', language)} isOpen={isOpen} active={activeItem === 'todo'} onClick={() => { setActiveItem('todo'); onOpenModule('todo'); }} extraClass="text-pink-600 hover:bg-pink-50" activeClass="text-pink-700 bg-pink-100" iconActive="text-pink-700" />
                        <SidebarItem icon={Icons.Calendar} label={t('Schedule', language)} isOpen={isOpen} active={activeItem === 'schedule'} onClick={() => { setActiveItem('schedule'); onOpenModule('schedule'); }} extraClass="text-indigo-600 hover:bg-indigo-50" activeClass="text-indigo-700 bg-indigo-100" iconActive="text-indigo-700" />
                        <SidebarItem icon={Icons.Cloud} label={t('Weather', language)} isOpen={isOpen} active={activeItem === 'weather'} onClick={() => { setActiveItem('weather'); onOpenModule('weather'); }} extraClass="text-cyan-600 hover:bg-cyan-50" activeClass="text-cyan-700 bg-cyan-100" iconActive="text-cyan-700" />

                        <div className="my-2 border-t border-gray-200/50 mx-4"></div>

        const MuteModeModule = ({ isOpen, onClose, language }) => {
            // 狀態管理：'warning' (警告) -> 'timer' (設定時間) -> 'active' (鎖定中)
            const [step, setStep] = useState('warning');

            // 將時間拆分為「分」與「秒」
            const [minutes, setMinutes] = useState(0);
            const [seconds, setSeconds] = useState(0);

            const [timeLeft, setTimeLeft] = useState(0);
            const intervalRef = useRef(null);

            // 每次開啟時重置狀態
            useEffect(() => {
                if (isOpen) {
                    setStep('warning');
                    setMinutes(0);
                    setSeconds(0);
                } else if (step === 'active') {
                    handleExit();
                }
            }, [isOpen]);

            const handleStartTimer = async () => {
                // 計算總秒數
                const totalSeconds = (minutes * 60) + seconds;
                if (totalSeconds <= 0) {
                    // 可以加入簡單的防呆，避免設定 0 分 0 秒
                    return;
                }

                setStep('active');
                setTimeLeft(totalSeconds);

                // 呼叫 Electron 鎖定電腦
                if (window.electronAPI && window.electronAPI.enterMuteMode) {
                    await window.electronAPI.enterMuteMode();
                }

                // 開始倒數
                intervalRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            handleExit();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const handleExit = async () => {
                clearInterval(intervalRef.current);
                setStep('warning');
                onClose();

                // 解除鎖定
                if (window.electronAPI && window.electronAPI.exitMuteMode) {
                    await window.electronAPI.exitMuteMode();
                }
                // 如果您有 showToast 函式，可以取消註解以下這行
                // showToast('靜音模式已結束', 'info');
            };

            const formatTime = (totalSecs) => {
                const m = Math.floor(totalSecs / 60);
                const s = totalSecs % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            if (!isOpen) return null;
