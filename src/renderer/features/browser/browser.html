    <title>Anechoic Browser Prototype (AI Powered)</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Markdown Renderer -->

    <!-- External Stylesheet -->
    <link rel="stylesheet" href="browser.css">
    <!-- Notes Stylesheet -->
    <link rel="stylesheet" href="../notes/css/notes.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ios: {
                            blue: '#007AFF',
                            gray: '#F2F2F7',
                            separator: '#C6C6C8',
                            destruct: '#FF3B30'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
</head>

            const container = document.getElementById('toast-container');
            if (!container) {
                console.warn('Toast container not found');
                return;
            }

            const safeText = String(msg ?? '');
            const iconByType = {
                success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>',
                info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="8"></line></svg>',

            };

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast__icon">${iconByType[type] || iconByType.info}</span>
                <span class="toast__text"></span>
                <button class="toast__close" type="button" aria-label="Close toast">

                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            `;
            const toastTextEl = toast.querySelector('.toast__text');
            if (toastTextEl) toastTextEl.textContent = safeText;
            toast.style.willChange = 'transform';
            toast.style.animation = 'toastIn 0.22s ease';

            container.appendChild(toast);

            let removed = false;
            const removeToast = () => {

        async function callGeminiAPI(prompt, systemInstruction = "You are a helpful study assistant.") {
            let effectiveKey = apiKey;
            if (!effectiveKey) {
                effectiveKey = localStorage.getItem('gemini_api_key');
            }

            if (!effectiveKey || !effectiveKey.trim()) {
                return "🚨 錯誤：請先點擊右上角 ⚙️ 設定您的 API Key。";
            }

            try {
                // 1. 自動清除金鑰前後不小心多複製到的空白字元 (非常常見的 Bug)
                effectiveKey = effectiveKey.trim();

                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${effectiveKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    }
                );

                if (!response.ok) {
                    // 2. 抓取伺服器真正回傳的錯誤原因
                    const errorData = await response.json().catch(() => ({}));
                    console.error("API Error Details:", errorData);

                    const errorMessage = errorData?.error?.message || `HTTP ${response.status}`;

                    // 3. 針對常見的錯誤給予明確的介面提示
                    if (errorMessage.includes("User location is not supported")) {
                        return `🚨 區域限制錯誤：Gemini API 目前封鎖了來自香港的直接連線。請開啟 VPN 切換至其他地區（如台灣、美國）後再試一次。`;
                    } else if (response.status === 400) {
                        return `🚨 請求格式錯誤 (400)：請確認金鑰是否正確。詳細原因：${errorMessage}`;
                    } else if (response.status === 403) {
                        return `🚨 權限拒絕 (403)：API 金鑰無效。詳細原因：${errorMessage}`;
                    }

                    return `🚨 伺服器錯誤：${errorMessage}`;
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI 沒有回傳任何內容。";
            } catch (error) {
                console.error("Gemini API Error:", error);
                return `🚨 網路連線錯誤：無法連接到 Google 伺服器 (${error.message})。請檢查網路或 VPN 狀態。`;
            }
        }

                description: t('You are the user\'s personal AI assistant.', language),
                greeting: t('What would you like to talk about today?', language),
                isDefault: true // 標記為預設，禁止編輯與刪除
            };

            const [view, setView] = useState('chat');
            const [characters, setCharacters] = useState(() => JSON.parse(localStorage.getItem('ai_characters') || '[]'));
            const [activeCharacter, setActiveCharacter] = useState(DEFAULT_CHARACTER); // 初始值改為預設助理
            const [editingChar, setEditingChar] = useState({ id: '', name: '', icon: '🤖', tagline: '', description: '', greeting: '' });

            // 合併預設角色與自訂角色陣列，供列表渲染使用
            const allCharacters = [DEFAULT_CHARACTER, ...characters];

            // 自動儲存角色到 LocalStorage
            useEffect(() => {
                localStorage.setItem('ai_characters', JSON.stringify(characters));
            }, [characters]);

            // 切換金鑰顯示
            useEffect(() => {
                if (aiMode === 'gemini') setApiKey(localStorage.getItem('gemini_api_key') || '');
                else if (aiMode === 'deepseek') setApiKey(localStorage.getItem('deepseek_api_key') || '');
                else if (aiMode === 'openrouter') setApiKey(localStorage.getItem('openrouter_api_key') || '');
            }, [aiMode]);

            // 載入本地模型列表
            useEffect(() => {
                if (window.electronAPI && window.electronAPI.getLocalModels) {
                    window.electronAPI.getLocalModels().then(models => {
                        setLocalModels(models);
                        if (models.length > 0) setSelectedLocalModel(models[0]);
                    });
                }
            }, []);

            useEffect(() => {
                if (!isModelDropdownOpen) return undefined;
                const handleClickOutside = (event) => {
                    if (modelDropdownRef.current && !modelDropdownRef.current.contains(event.target)) {
                        setIsModelDropdownOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [isModelDropdownOpen]);

            const handleConfirmKey = () => {
                if (!apiKey.trim()) return alert("請輸入有效的 API Key");
                if (aiMode === 'gemini') localStorage.setItem('gemini_api_key', apiKey);
                else if (aiMode === 'deepseek') localStorage.setItem('deepseek_api_key', apiKey);
                else if (aiMode === 'openrouter') localStorage.setItem('openrouter_api_key', apiKey);
                setIsSaved(true);
                setTimeout(() => { setShowSettings(false); setIsSaved(false); }, 1000);
            };

            const handleLocalModelChange = async (e) => {
                const filename = e.target.value;
                setSelectedLocalModel(filename);
                if (window.electronAPI && window.electronAPI.loadLocalModel) {
                    setIsModelLoading(true);
                    setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `⏳ 正在為您切換至 \`${filename}\` 模型...` }]);
                    const result = await window.electronAPI.loadLocalModel(filename);
                    if (result.ok) setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `✅ 成功切換至 \`${filename}\`！` }]);
                    else setLocalMessages(prev => [...prev, { id: Date.now(), role: 'ai', text: `❌ 載入失敗：${result.error}` }]);
                    setIsModelLoading(false);
                }
            };

            // 取得當前對話陣列
            let currentMessages, setCurrentMessages;
            if (aiMode === 'local') { currentMessages = localMessages; setCurrentMessages = setLocalMessages; }
            else if (aiMode === 'gemini') { currentMessages = geminiMessages; setCurrentMessages = setGeminiMessages; }
            else if (aiMode === 'deepseek') { currentMessages = deepseekMessages; setCurrentMessages = setDeepseekMessages; }
            else { currentMessages = openRouterMessages; setCurrentMessages = setOpenRouterMessages; }

            const messagesEndRef = useRef(null);
            useEffect(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), [currentMessages, loading, view]);

            const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(e); } };

            // === 🎭 角色扮演核心邏輯 ===
            const handleSelectCharacter = (char) => {
                setActiveCharacter(char);
                setView('chat');

                // 【修復 Bug】：徹底清空所有模式的歷史對話，確保不會有舊對話殘留
                const greetingMsg = { id: Date.now(), role: 'ai', text: char.greeting || `你好！我是 ${char.name}。` };
                setLocalMessages([greetingMsg]);
                setGeminiMessages([greetingMsg]);
                setDeepseekMessages([greetingMsg]);
                setOpenRouterMessages([greetingMsg]);
            };

            const handleSaveCharacter = () => {
                if (!editingChar.name.trim() || !editingChar.description.trim()) return alert(t('Please at least fill in Character Name and System Prompt!', language));
                if (editingChar.id === 'default') return alert(t('Cannot edit default assistant!', language));

                if (editingChar.id) {
                    setCharacters(prev => prev.map(c => c.id === editingChar.id ? editingChar : c));
                    if (activeCharacter?.id === editingChar.id) {
                        setActiveCharacter(editingChar);
                    }
                } else {
                    setCharacters(prev => [{ ...editingChar, id: Date.now().toString() }, ...prev]);
                }
                setView('character-list');
            };

            const handleEditCharacter = (char, e) => {
                e.stopPropagation();
                if (char.isDefault) {
                    return;
                }
                setEditingChar({ ...char });
                setView('character-edit');
            };

            const handleDeleteCharacter = (id, e) => {
                e.stopPropagation();
                if (id === 'default') return; // 防呆：禁止刪除預設角色

                if (confirm(t('Are you sure you want to delete this character?', language))) {
                    setCharacters(prev => prev.filter(c => c.id !== id));

                    // 如果刪除的是當前正在聊天的角色，自動切換回預設助理並清空對話
                    if (activeCharacter?.id === id) {
                        handleSelectCharacter(DEFAULT_CHARACTER);
                    }
                }
            };

            // === 發送訊息邏輯 ===
            const handleSend = async (e) => {
                e?.preventDefault();
                if (!input.trim() || loading || isModelLoading) return;

                if (aiMode !== 'local' && !apiKey.trim()) {
                    alert(t('Please input your API key!', language));
                    setShowSettings(true);
                    return;
                }

                const userMsg = { id: Date.now(), role: 'user', text: input.trim() };
                setCurrentMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                let aiResponseText = t('AI temporarily unavailable.', language);

                // 核心：根據是否有選擇角色，決定系統提示詞 (System Prompt)
                const defaultSystemPrompt = t('You are the user\'s专属 AI assistant.', language);
                const systemPromptToUse = activeCharacter ? activeCharacter.description : defaultSystemPrompt;

                try {
                    if (aiMode === 'local') {
                        if (window.electronAPI && window.electronAPI.chatWithLocalAI) {
                            // 本地模型透過字串組合注入 System Prompt
                            const promptToSend = `System: ${systemPromptToUse}\nUser: ${userMsg.text}\nAssistant:`;
                            aiResponseText = await window.electronAPI.chatWithLocalAI(promptToSend);
                        }
                    } else if (aiMode === 'gemini') {
                        aiResponseText = await callGeminiAPI(userMsg.text, systemPromptToUse);
                    } else if (aiMode === 'deepseek') {
                        aiResponseText = await callDeepseekAPI(userMsg.text, systemPromptToUse);
                    } else if (aiMode === 'openrouter') {
                        aiResponseText = await callOpenRouterAPI(userMsg.text, systemPromptToUse);
                    }
                } catch (error) {
                    aiResponseText = `發生錯誤：${error.message}`;
                }

                setCurrentMessages(prev => [...prev, { id: Date.now() + 1, role: 'ai', text: aiResponseText }]);
                setLoading(false);
            };

            const modelOptions = [
                { value: 'local', label: 'local models' },
                { value: 'gemini', label: 'Gemini' },
                { value: 'deepseek', label: 'Deepseek' },
                { value: 'openrouter', label: 'Trinity (free)' },
            ];
            const modelLabel = modelOptions.find(option => option.value === aiMode)?.label || 'local models';
            const shouldShowWelcome = currentMessages.length <= 1 && activeCharacter.id === 'default';

            if (!isOpen) return null;

            return (
                <div className="ane-overlay-backdrop" onClick={onClose}>
                    <div className="ane-ai-modal" onClick={(e) => e.stopPropagation()}>
                        <div className="ane-ai-header">
                            {view !== 'chat' ? (
                                <button type="button" className="ane-ai-icon-btn" onClick={() => setView('chat')} title="Back">
                                    <Icons.ChevronLeft />
                                </button>
                            ) : (
                                <span className="ane-ai-header__icon" onClick={() => handleSelectCharacter(DEFAULT_CHARACTER)} title="Default assistant">
                                    {activeCharacter.icon?.startsWith('data:image')
                                        ? <img src={activeCharacter.icon} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="avatar" />
                                        : activeCharacter.id === 'default'
                                            ? <Icons.Bot style={{ width: '15px', height: '15px', strokeWidth: 1.7 }} />
                                            : <span style={{ fontSize: '14px', lineHeight: 1 }}>{activeCharacter.icon || activeCharacter.name.charAt(0).toUpperCase()}</span>}
                                </span>
                            )}
                            <div className="ane-ai-title">
                                <span className="ane-ai-title__main">
                                    {view === 'chat' ? activeCharacter.name : view === 'character-list' ? 'Character Hub' : 'New Character'}
                                </span>
                                {view === 'chat' && (
                                    <span className="ane-ai-title__sub">
                                        <span className="ane-ai-model-switch-wrap" ref={modelDropdownRef}>
                                            <button
                                                type="button"
                                                className={`ane-ai-model-switch ${isModelDropdownOpen ? 'is-open' : ''}`}
                                                onClick={() => setIsModelDropdownOpen((prev) => !prev)}
                                            >
                                                <span>{modelLabel}</span>
                                                <Icons.ChevronDown className="ane-ai-model-switch__caret" />
                                            </button>
                                            {isModelDropdownOpen && (
                                                <div className="ane-ai-model-popover">
                                                    <span className="ane-ai-model-popover__label">Model</span>
                                                    <span className="ane-ai-model-popover__divider"></span>
                                                    {modelOptions.map((option) => (
                                                        <button
                                                            key={option.value}
                                                            type="button"
                                                            className={`ane-ai-model-option ${aiMode === option.value ? 'is-active' : ''}`}
                                                            onClick={() => {
                                                                setAiMode(option.value);
                                                                setIsModelDropdownOpen(false);
                                                            }}
                                                        >
                                                            <span className={`ane-ai-model-option__dot ${aiMode === option.value ? 'is-active' : ''}`}></span>
                                                            <span className="ane-ai-model-option__label">{option.label}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </span>
                                        {aiMode === 'local' && localModels.length > 0 && (
                                            <select className="ane-ai-local-model-select" value={selectedLocalModel} onChange={handleLocalModelChange} disabled={isModelLoading}>
                                                {localModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        )}
                                    </span>
                                )}
                            </div>
                            <div className="ane-ai-head-actions">
                                {view === 'chat' && (
                                    <button type="button" className="ane-ai-icon-btn is-accent" onClick={() => setView('character-list')} title="Character Hub">
                                        <Icons.Users />
                                    </button>
                                )}
                                {view === 'character-list' && (
                                    <button
                                        type="button"
                                        className="ane-ai-icon-btn is-accent"
                                        onClick={() => {
                                            setEditingChar({ id: '', name: '', icon: '🤖', tagline: '', description: 'You are a...', greeting: 'Hello!' });
                                            setView('character-edit');
                                        }}
                                        title="New Character"
                                    >
                                        <Icons.Plus />
                                    </button>
                                )}
                                {view === 'chat' && aiMode !== 'local' && (
                                    <button type="button" className="ane-ai-icon-btn" onClick={() => setShowSettings(!showSettings)} title="API Key">
                                        <Icons.Settings />
                                    </button>
                                )}
                                <button type="button" className="ane-ai-icon-btn" onClick={onClose} title="Close">
                                    <Icons.X />
                                </button>
                            </div>
                        </div>

                        {/* API key row */}
                        {view === 'chat' && showSettings && aiMode !== 'local' && (
                            <div className="ane-ai-api">
                                <input
                                    type="password"
                                    value={apiKey}
                                    onChange={e => { setApiKey(e.target.value); setIsSaved(false); }}
                                    placeholder="Enter API key..."
                                />
                                <button type="button" onClick={handleConfirmKey}>{isSaved ? 'Saved' : 'Confirm'}</button>
                            </div>
                        )}

                        {/* === Main Content === */}
                        <div className="ane-ai-body">

                            {/* 1. Chat View */}
                            {view === 'chat' && (
                                <>
                                    <div className="ane-ai-scroll">
                                        {shouldShowWelcome ? (
                                            <div className="ane-ai-welcome">
                                                <span className="ane-ai-welcome__icon"><Icons.Bot /></span>
                                                <p className="ane-ai-welcome__title">What can I help with?</p>
                                                <p className="ane-ai-welcome__sub">Ask me anything, or start with one of these suggestions.</p>
                                                <div className="ane-ai-suggestions">
                                                    <button type="button" className="ane-ai-suggestion" onClick={() => setInput('Please write a code snippet for browser extension settings sync.')}>
                                                        <span className="ane-ai-suggestion__icon"><Icons.FileText /></span>
                                                        <span className="ane-ai-suggestion__label">Write a code snippet</span>
                                                    </button>
                                                    <button type="button" className="ane-ai-suggestion" onClick={() => setInput('Please summarize this page in bullet points.')}>
                                                        <span className="ane-ai-suggestion__icon"><Icons.Search /></span>
                                                        <span className="ane-ai-suggestion__label">Summarize this page</span>
                                                    </button>
                                                    <button type="button" className="ane-ai-suggestion" onClick={() => setInput('Help me run a local AI task with the current model.')}>
                                                        <span className="ane-ai-suggestion__icon"><Icons.Bot /></span>
                                                        <span className="ane-ai-suggestion__label">Run local AI task</span>
                                                    </button>
                                                    <button type="button" className="ane-ai-suggestion" onClick={() => setInput('Help me brainstorm ideas for my next project.')}>
                                                        <span className="ane-ai-suggestion__icon"><Icons.Sparkles /></span>
                                                        <span className="ane-ai-suggestion__label">Help me brainstorm</span>
                                                    </button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="ane-ai-thread">
                                                {currentMessages.map(msg => (
                                                    <div key={msg.id} className={`ane-ai-msg ${msg.role === 'user' ? 'is-user' : 'is-ai'}`}>
                                                        <div className={`ane-ai-bubble ${msg.role === 'user' ? 'is-user' : 'is-ai'}`}>
                                                            {msg.role === 'ai' && typeof marked !== 'undefined'
                                                                ? <div className="prose prose-p:my-1" dangerouslySetInnerHTML={{ __html: marked.parse(msg.text) }} />
                                                                : <div className="whitespace-pre-wrap">{msg.text}</div>}
                                                        </div>
                                                    </div>
                                                ))}
                                                {loading && (
                                                    <div className="ane-ai-msg is-ai">
                                                        <div className="ane-ai-typing"><i></i><i></i><i></i></div>
                                                    </div>
                                                )}
                                                <div ref={messagesEndRef}></div>
                                            </div>
                                        )}
                                    </div>
                                    <form onSubmit={handleSend} className="ane-ai-input-bar">
                                        <div className="ane-ai-input-wrap">
                                            <textarea
                                                value={input}
                                                onChange={(e) => setInput(e.target.value)}
                                                onKeyDown={handleKeyDown}
                                                placeholder={activeCharacter ? `Message ${activeCharacter.name}...` : 'Message assistant...'}
                                                rows="1"
                                                disabled={loading || isModelLoading}
                                            />
                                        </div>
                                        <button
                                            type="submit"
                                            className={`ane-ai-send ${input.trim() && !loading && !isModelLoading ? 'is-ready' : ''}`}
                                            disabled={loading || !input.trim() || isModelLoading}
                                        >
                                            <Icons.Send />
                                        </button>
                                    </form>
                                </>
                            )}

                            {/* 2. Character Hub */}
                            {view === 'character-list' && (
                                <div className="ane-ai-hub">
                                    <div className="ane-ai-hub__label-row">
                                        <span className="ane-ai-hub__label">Characters</span>
                                        <span className="ane-ai-hub__count">{allCharacters.length}</span>
                                    </div>
                                    {allCharacters.map(char => (
                                        <div
                                            key={char.id}
                                            onClick={() => handleSelectCharacter(char)}
                                            className={`ane-ai-char-card ${activeCharacter.id === char.id ? 'is-active' : ''}`}
                                            role="button"
                                            tabIndex={0}
                                        >
                                            <span className="ane-ai-char-card__avatar">
                                                {char.icon?.startsWith('data:image')
                                                    ? <img src={char.icon} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="avatar" />
                                                    : (char.icon || char.name.charAt(0).toUpperCase())}
                                            </span>
                                            <span className="ane-ai-char-card__meta">
                                                <span className="ane-ai-char-card__name">{char.name}</span>
                                                <span className="ane-ai-char-card__desc">{char.tagline || char.description}</span>
                                            </span>
                                            {activeCharacter.id === char.id && (
                                                <span className="ane-ai-char-card__badge">Active</span>
                                            )}
                                            {!char.isDefault && (
                                                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '6px' }}>
                                                    <button type="button" className="ane-ai-icon-btn" onClick={(e) => handleEditCharacter(char, e)} title="Edit character">
                                                        <Icons.Settings />
                                                    </button>
                                                    <button type="button" className="ane-ai-icon-btn" onClick={(e) => handleDeleteCharacter(char.id, e)} title="Delete character">
                                                        <Icons.Trash />
                                                    </button>
                                                </span>
                                            )}
                                        </div>
                                    ))}
                                    <button
                                        type="button"
                                        className="ane-ai-char-new"
                                        onClick={() => {
                                            setEditingChar({ id: '', name: '', icon: '🤖', tagline: '', description: 'You are a...', greeting: 'Hello!' });
                                            setView('character-edit');
                                        }}
                                    >
                                        <span className="ane-ai-char-new__icon"><Icons.Plus /></span>
                                        <span className="ane-ai-char-new__label">New character</span>
                                    </button>
                                </div>
                            )}

                            {/* 3. Create/Edit Character */}
                            {view === 'character-edit' && (
                                <div className="ane-ai-form">
                                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: '12px' }}>
                                        <div className="ane-ai-field" style={{ flex: 1, marginBottom: 0 }}>
                                            <label className="ane-ai-field__label">Character name</label>
                                            <input
                                                value={editingChar.name}
                                                onChange={e => setEditingChar({ ...editingChar, name: e.target.value })}
                                                placeholder="e.g. Code Helper"
                                            />
                                        </div>
                                        <div style={{ width: '56px', marginBottom: '14px' }}>
                                            <label className="ane-ai-field__label" style={{ justifyContent: 'center', width: '100%', marginBottom: '5px' }}>
                                                <span className="ane-ai-field__hint">Avatar</span>
                                            </label>
                                            <label className="ane-ai-char-card__avatar" style={{ width: '52px', height: '52px', borderRadius: '13px', cursor: 'pointer', position: 'relative' }}>
                                                <input
                                                    type="file"
                                                    accept="image/*"
                                                    style={{ position: 'absolute', opacity: 0, inset: 0, cursor: 'pointer' }}
                                                    onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if (file) {
                                                            const reader = new FileReader();
                                                            reader.onloadend = () => setEditingChar({ ...editingChar, icon: reader.result });
                                                            reader.readAsDataURL(file);
                                                        }
                                                    }}
                                                />
                                                {editingChar.icon?.startsWith('data:image')
                                                    ? <img src={editingChar.icon} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="avatar" />
                                                    : (editingChar.icon || '🤖')}
                                            </label>
                                        </div>
                                    </div>

                                    <div className="ane-ai-field">
                                        <label className="ane-ai-field__label">
                                            Tagline
                                            <span className="ane-ai-field__hint">Shown below the character name</span>
                                        </label>
                                        <input
                                            value={editingChar.tagline}
                                            onChange={e => setEditingChar({ ...editingChar, tagline: e.target.value })}
                                            placeholder="e.g. A philosophical guide from ancient Greece"
                                        />
                                    </div>

                                    <div className="ane-ai-field">
                                        <label className="ane-ai-field__label">
                                            Greeting
                                            <span className="ane-ai-field__hint">First message sent to the user</span>
                                        </label>
                                        <input
                                            value={editingChar.greeting}
                                            onChange={e => setEditingChar({ ...editingChar, greeting: e.target.value })}
                                            placeholder="Hello! How can I assist you?"
                                        />
                                    </div>

                                    <div className="ane-ai-field">
                                        <label className="ane-ai-field__label">
                                            System prompt
                                            <span className="ane-ai-field__hint">Determines how the AI plays the role</span>
                                        </label>
                                        <textarea
                                            value={editingChar.description}
                                            onChange={e => setEditingChar({ ...editingChar, description: e.target.value })}
                                            placeholder="You are a..."
                                        ></textarea>
                                    </div>

                                    <div className="ane-ai-form-footer">
                                        <button type="button" className="ane-ai-cancel" onClick={() => setView('character-list')}>Cancel</button>
                                        <button type="button" className="ane-ai-save" onClick={handleSaveCharacter}>Save character</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Chat Room Module
        const ChatRoomModule = ({ isOpen, onClose, language, user }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isAskingAI, setIsAskingAI] = useState(false);
            const messagesEndRef = useRef(null);

            const storageKey = getStorageKey('anechoic_chatroom_messages');
            const currentUsername = user?.name || t('Guest User', language);

            useEffect(() => {
                if (!isOpen) return;

                try {
                    const saved = localStorage.getItem(storageKey);
                    const parsed = saved ? JSON.parse(saved) : [];
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        setMessages(parsed);
                    } else {
                        setMessages([{
                            id: `system-${Date.now()}`,
                            role: 'system',
                            user: 'Anechoic',
                            text: 'Chat room ready. Messages are saved locally for this user.',
                            createdAt: new Date().toISOString()
                        }]);
                    }
                } catch (error) {
                    setMessages([]);
                }
            }, [isOpen, storageKey]);

            useEffect(() => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, isOpen]);

            const saveMessages = (nextMessages) => {
                localStorage.setItem(storageKey, JSON.stringify(nextMessages));
                setMessages(nextMessages);
            };

            const appendMessage = (message) => {
                const nextMessages = [...messages, message];
                saveMessages(nextMessages);
            };

            const handleSend = (event) => {
                event.preventDefault();
                const text = input.trim();
                if (!text) return;

                appendMessage({
                    id: `msg-${Date.now()}`,
                    role: 'user',
                    user: currentUsername,
                    text,
                    createdAt: new Date().toISOString()
                });
                setInput('');
            };

            const handleAskAI = async () => {
                const latestUserMessage = [...messages].reverse().find(msg => msg.role === 'user');
                if (!latestUserMessage || isAskingAI) return;

                setIsAskingAI(true);
                let aiText = 'AI reply failed.';
                try {
                    if (window.electronAPI?.chatWithLocalAI) {
                        aiText = await window.electronAPI.chatWithLocalAI(`You are helping in a study chatroom. Reply briefly and clearly.\nUser message: ${latestUserMessage.text}`);
                    } else {
                        aiText = 'Local AI is not available in this runtime.';
                    }
                } catch (error) {
                    aiText = `AI error: ${error.message}`;
                }

                appendMessage({
                    id: `ai-${Date.now()}`,

            useEffect(() => {

                    if (typeof window.initNotesApp === 'function') {
                        window.initNotesApp();
                        notesInitRef.current = true;
                        console.log("✅ [NotesApp] 后台初始化成功！");
                    } else if (attempts < 50) {
                        attempts++;
                        setTimeout(tryInit, 100); // Retry every 100ms until the module is loaded
                    } else {

        // History Module
        const HistoryModule = ({ isOpen, onClose, tabs, onNavigate, language }) => {

            // Load history when modal opens

                if (isOpen) {
                    loadHistory();
                    setIsConfirmingClear(false);
                }
            }, [isOpen]);

            const loadHistory = async () => {
                setLoading(true);
                if (window.anechoicAPI) {
                    const result = await window.anechoicAPI.getHistory();
                    if (result.ok) setHistoryData(result.data || []);

                }
                setLoading(false);

            const handleDelete = async (e, url) => {
                e.stopPropagation();
                if (window.anechoicAPI && window.anechoicAPI.deleteHistory) {
                    const result = await window.anechoicAPI.deleteHistory(url);
                    if (result.ok) {
                        setHistoryData(result.data);
                    }
                }
            };

            const handleClear = async () => {
                if (window.anechoicAPI && window.anechoicAPI.clearHistory) {
                    const result = await window.anechoicAPI.clearHistory();
                    if (result.ok) {
                        setHistoryData(result.data);
                        showToast('History cleared', 'success');
                    }
                    setIsConfirmingClear(false);
                }
            };

            const filteredHistory = historyData.filter(item =>
                item.url.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (item.title && item.title.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const pad = (value) => String(value).padStart(2, '0');
            const getDateKey = (timestamp) => {
                const date = new Date(timestamp);
                if (Number.isNaN(date.getTime())) return '';
                return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
            };
            const getDateLabel = (dateKey) => {
                if (!dateKey) return '';
                const now = new Date();
                const today = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
                const y = new Date(now);
                y.setDate(now.getDate() - 1);
                const yesterday = `${y.getFullYear()}/${y.getMonth() + 1}/${y.getDate()}`;
                if (dateKey === today) return 'Today';
                if (dateKey === yesterday) return 'Yesterday';
                return dateKey;
            };
            const formatVisitedAt = (timestamp) => {
                const date = new Date(timestamp);
                if (Number.isNaN(date.getTime())) return '';
                return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            };
            const groupedHistory = filteredHistory.reduce((acc, item) => {
                const key = getDateKey(item.timestamp);
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});
            const groupedHistoryEntries = Object.entries(groupedHistory).sort((a, b) => {
                const aDate = new Date(a[0].replace(/\//g, '-')).getTime();
                const bDate = new Date(b[0].replace(/\//g, '-')).getTime();
                return bDate - aDate;

                                <div className="ane-utility-empty">
                                    <Icons.History />
                                    <div>{t('No history found', language)}</div>

                                    <div key={dateKey}>
                                        <div className="ane-utility-list__group-label">
                                            <span>{getDateLabel(dateKey)}</span>

                                                    </button>
                                                    <button

                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Bookmarks Module
        const BookmarksModule = ({ isOpen, onClose, onNavigate, language }) => {

            const [loading, setLoading] = useState(false);


            useEffect(() => {
                if (isOpen) {
                    setLoading(true);
                    try {
                        // 从 LocalStorage 读取
                        const saved = localStorage.getItem(getStorageKey('my_bookmarks')); // 注意保持 key 一致
                        const data = saved ? JSON.parse(saved) : [];
                        setBookmarks(data);
                    } catch (e) {
                        console.error(e);

                    }
                    setLoading(false);
                }

            const handleRemoveBookmark = (url) => {
                try {
                    // 1. 获取当前所有书签 / Get current bookmarks
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    const currentBookmarks = saved ? JSON.parse(saved) : [];

                    // 2. 过滤掉要删除的那个 URL / Filter out the URL to remove
                    const updatedBookmarks = currentBookmarks.filter(b => b.url !== url);

                    // 3. 保存回 localStorage / Save back to localStorage
                    localStorage.setItem(getStorageKey('my_bookmarks'), JSON.stringify(updatedBookmarks));

                    // 4. 更新当前列表状态 (让界面立即刷新) / Update state (Refresh UI immediately)
                    setBookmarks(updatedBookmarks);

                    // 5. 提示成功 / Show success message
                    showToast('Bookmark removed', 'success');

                    // (可选) 如果你正好在看这个页面，这也应该触发主按钮变灰，
                    // 但由于 React 组件隔离，主按钮需要在下一次交互或刷新后才会变灰。
                    // 简单的解决方法是刷新整个页面，或者这就够了。
                } catch (error) {
                    console.error('Remove failed:', error);
                    showToast('Failed to remove bookmark', 'error');
                }

            const filteredBookmarks = bookmarks.filter(bookmark => {
                const title = (bookmark.title || '').toLowerCase();
                const url = (bookmark.url || '').toLowerCase();

                                            <span className="ane-utility-row__title">{bookmark.title || bookmark.url}</span>

                                            <button

                                                <Icons.Trash />
