            // === [新增] User State & Login Logic ===
            const [user, setUser] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [isLoginMode, setIsLoginMode] = useState(true); // 預設為 true (登入模式)
            const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '' });

            // === Theme Customization State ===
            const [themeSettings, setThemeSettings] = useState({ daily: '#c2410c', learning: '#1d4ed8' });
            const [isCustomTheme, setIsCustomTheme] = useState(false);

            // === [請在這裡補回遺失的 handleLogin] ===
            const handleLogin = () => {
                setShowLoginModal(true);
                setIsLoginMode(true); // 確保每次點擊都是打開「登入」模式
                setShowSettings(false); // 順便幫你加上這行，點擊登入後自動關閉設定選單，體驗更好
            };

            const handleThemeChange = (themeMode, color) => {
                setThemeSettings(prev => ({ ...prev, [themeMode]: color }));
                setIsCustomTheme(true);
            };

            const resetTheme = () => {
                setThemeSettings({ daily: '#c2410c', learning: '#1d4ed8' });
                setIsCustomTheme(false);
                showToast('Theme reset to default', 'success');
            };

            const handleLogout = async () => {
                setUser(null);
                localStorage.removeItem('anechoic_user');
                // 通知 Electron 切換回訪客歷史記錄
                if (window.electronAPI && window.electronAPI.setCurrentUser) {
                    await window.electronAPI.setCurrentUser('guest');
                }
                // 重新載入頁面以清空畫面上的舊資料
                setTimeout(() => window.location.reload(), 500);
            };

            const submitFakeAuth = async (e) => {
                e.preventDefault();
                if (!authForm.username.trim() || !authForm.password.trim()) return;

                const username = authForm.username.trim();
                const password = authForm.password.trim();

                // 從 localStorage 讀取「假資料庫」
                const accounts = JSON.parse(localStorage.getItem('anechoic_accounts_db') || '[]');
                const existingUser = accounts.find(a => a.username === username);

                if (isLoginMode) {
                    // === 登入邏輯 ===
                    if (!existingUser || existingUser.password !== password) {
                        if (typeof showToast === 'function') showToast(t('Login failed: Invalid username or password', language) || '登入失敗：帳號或密碼錯誤', 'error');
                        return;
                    }
                } else {
                    // === 註冊邏輯 ===
                    if (password !== authForm.confirmPassword) {
                        if (typeof showToast === 'function') showToast(t('Passwords do not match!', language), 'error');
                        return;
                    }
                    if (existingUser) {
                        if (typeof showToast === 'function') showToast(t('Username already exists!', language) || '帳號已經存在！', 'error');
                        return;
                    }
                    // 儲存新帳號到假資料庫
                    accounts.push({ username, password });
                    localStorage.setItem('anechoic_accounts_db', JSON.stringify(accounts));
                }

                // 產生大頭貼與使用者物件
                const firstLetter = username.charAt(0).toUpperCase();
                const avatarSvg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%233B82F6"/><text x="50" y="50" font-family="sans-serif" font-size="50" font-weight="bold" fill="white" dominant-baseline="central" text-anchor="middle">${firstLetter}</text></svg>`;

                const fakeUser = {
                    id: "fake_" + Date.now(),
                    name: username,
                    avatar: avatarSvg
                };

                // 儲存當前登入狀態
                setUser(fakeUser);
                localStorage.setItem('anechoic_user', JSON.stringify(fakeUser));

                // [重要] 通知 Electron 後端切換使用者，載入該使用者的 History 和 Notes
                if (window.electronAPI && window.electronAPI.setCurrentUser) {
                    await window.electronAPI.setCurrentUser(username);
                }

                setShowLoginModal(false);
                setAuthForm({ username: '', password: '', confirmPassword: '' });

                if (typeof showToast === 'function') {
                    const msg = isLoginMode ? `${t('Welcome back, ', language)}${username}！` : `${t('Registration successful, welcome ', language)}${username}！`;
                    showToast(msg, 'success');
                }

                // 重新載入頁面，讓所有元件 (書籤、Todo) 讀取新使用者的專屬 Key
                setTimeout(() => window.location.reload(), 1000);
            };


            const [language, setLanguage] = useState(() => {
                return localStorage.getItem('anechoic_lang') || 'en';
            });

            const handleLanguageChange = (newLang) => {
                setLanguage(newLang);
                localStorage.setItem('anechoic_lang', newLang);
            };

            const handleClearAllUserData = async () => {
                //清user data
                if (!window.confirm('Are you sure you want to clear all user data? This will delete your history, bookmarks, and reset theme colors.')) {
                    return;
                }
                try {
                    if (window.electronAPI && window.electronAPI.invoke) {
                    await window.electronAPI.invoke('history:clear');
                    }
                    localStorage.removeItem('my_bookmarks');
                    resetTheme();
                    localStorage.removeItem('anechoic_shortcuts');
                    const defaultShortcuts = [
                        { id: 1, title: 'Google', url: 'https://google.com', icon: 'G' },
                        { id: 2, title: 'Canvas', url: 'https://canvas.instructure.com', icon: 'C' },
                        { id: 3, title: 'YouTube', url: 'https://youtube.com', icon: 'Y' },
                        { id: 4, title: 'Gmail', url: 'https://gmail.com', icon: 'G' }
                    ];
                    setShortcuts(defaultShortcuts);
                    setIsBookmarked(false);
                    showToast('All user data cleared', 'success');
                } catch (error) {
                    console.error('Clear data error:', error);
                    showToast('Failed to clear some data', 'error');
                }
                };
                
                //快捷方式
                useEffect(() => {
                    const saved = localStorage.getItem('anechoic_shortcuts');
                    if (saved) {
                        try {
                        setShortcuts(JSON.parse(saved));
                        } catch (e) {}
                    } else {
                        const defaultShortcuts = [
                            { id: 1, title: 'Google', url: 'https://google.com', icon: 'G' },
                            { id: 2, title: 'Canvas', url: 'https://canvas.instructure.com', icon: 'C' },
                            { id: 3, title: 'YouTube', url: 'https://youtube.com', icon: 'Y' },
                            { id: 4, title: 'Gmail', url: 'https://gmail.com', icon: 'G' }
                        ];
                        setShortcuts(defaultShortcuts);
                        localStorage.setItem('anechoic_shortcuts', JSON.stringify(defaultShortcuts));
                    }
                }, []);

                //Open new tab for right click menu
                const openInNewTab = (url) => {
                    const newId = `tab-${Date.now()}`;
                    const newTab = { id: newId, title: url, url: url, isLoading: true, history: [url], historyIndex: 0, canGoBack: false, canGoForward: false };
                    setTabs(prev => [...prev, newTab]);
                    setActiveTabId(newId);
                };

                const addShortcut = (title, url) => {
                    if (shortcuts.length >= 8) return;
                    const newShortcut = {
                        id: Date.now(),
                        title,
                        url,
                        icon: title.charAt(0).toUpperCase()
                    };
                    const updated = [...shortcuts, newShortcut];
                    setShortcuts(updated);
                    localStorage.setItem('anechoic_shortcuts', JSON.stringify(updated));
                };

                const removeShortcut = (id) => {
                    const updated = shortcuts.filter(s => s.id !== id);
                    setShortcuts(updated);
                    localStorage.setItem('anechoic_shortcuts', JSON.stringify(updated));
                };

            // === [新增結束] ===
            // Verify anechoicAPI on mount
            useEffect(() => {
                // 1. 檢查 anechoicAPI (保留原有檢查)
                if (window.anechoicAPI) {
                    console.log('✅ anechoicAPI is available');
                } else {
                    console.warn('⚠️ anechoicAPI is missing');
                }

                // 2. 讀取 LocalStorage 的舊登入紀錄
                const saved = localStorage.getItem('anechoic_user');
                if (saved) {
                    try { setUser(JSON.parse(saved)); } catch (e) { }
                }

                // 3. 監聽 Electron 登入成功事件 (Debug Log 版本)
                console.log('Checking electronAPI:', window.electronAPI);

                if (window.electronAPI && window.electronAPI.onLoginSuccess) {
                    console.log('👂 Listening for login success...');

                    window.electronAPI.onLoginSuccess((userData) => {
                        console.log('🎉 FRONTEND RECEIVED USER DATA:', userData);
                        setUser(userData);
                        localStorage.setItem('anechoic_user', JSON.stringify(userData));
                        setShowSettings(true); // 登入成功後自動彈出設定選單
                    });
                } else {
                    console.error('❌ electronAPI.onLoginSuccess is missing!');
                }

                if (window.electronAPI && window.electronAPI.on) {
                    const handleTabCreate = (event, { url }) => {
                        openInNewTab(url);
                    };
                    window.electronAPI.on('tabs:create', handleTabCreate);
                }
            }, []);

            // 计算当前激活的 Tab
            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];
            const canGoBack = activeTab.canGoBack || false;
            const canGoForward = activeTab.canGoForward || false;

            // === 1. 书签逻辑 (必须放在 useEffect 之前) ===

            // 检查当前 URL 是否已收藏
            const checkBookmarkStatus = (currentUrl) => {
                if (!currentUrl) return false;
                try {
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    const bookmarks = saved ? JSON.parse(saved) : [];
                    return bookmarks.some(b => b.url === currentUrl);
                } catch (e) {
                    console.error("Failed to read bookmarks", e);
                    return false;
                }
            };

            // 切换收藏状态
            const toggleBookmark = () => {
                if (!activeTab.url) {
                    showToast('Cannot bookmark a blank page', 'warning');
                    return;
                }
                try {
                    const saved = localStorage.getItem(getStorageKey('my_bookmarks'));
                    let bookmarks = saved ? JSON.parse(saved) : [];
                    const currentUrl = activeTab.url;

                    const isExisting = bookmarks.some(b => b.url === currentUrl);

                    if (isExisting) {
                        bookmarks = bookmarks.filter(b => b.url !== currentUrl);
                        setIsBookmarked(false);
                        showToast('Removed from favorites', 'info');
                    } else {
                        bookmarks.push({
                            title: activeTab.title || 'No Title',
                            url: currentUrl,
                            timestamp: Date.now()
                        });
                        setIsBookmarked(true);
                        showToast('Added to favorites!', 'success');
                    }
                    localStorage.setItem(getStorageKey('my_bookmarks'), JSON.stringify(bookmarks));
                } catch (e) {
                    showToast('Operation failed: ' + e.message, 'error');
                }
            };

            // === 2. Effects (监听器) ===

            // 监听 URL 变化，更新书签按钮状态
            useEffect(() => {
                const status = checkBookmarkStatus(activeTab.url);
                setIsBookmarked(status);
            }, [activeTab.url, activeTabId]);

            // Verify anechoicAPI
            useEffect(() => {
                if (window.anechoicAPI) {
                    console.log('✅ anechoicAPI available');
                }
            }, []);

            // 侧边栏宽度通信
            const handleSidebarToggle = async (newOpenState) => {
                setSidebarOpen(newOpenState);
                const newWidth = newOpenState ? 256 : 64;
                if (window.electronAPI?.setSidebarWidth) {
                    await window.electronAPI.setSidebarWidth(newWidth);
                }
            };

            // 地址栏同步
            useEffect(() => {
                setAddressBarValue(activeTab.url);
            }, [activeTabId, activeTab.url]);

            // Webview Ref 更新
            useEffect(() => {
                const currentWebviewEl = webviewRefs.current[activeTabId];
                if (currentWebviewEl) {
                    setWebview(currentWebviewEl);
                }
            }, [activeTabId, tabs]);

            // Webview 事件监听
            useEffect(() => {
                if (!webview) return;

                const updateNavigationState = () => {
                    try {
                        updateTab(activeTabId, {
                            canGoBack: webview.canGoBack(),
                            canGoForward: webview.canGoForward(),
                            url: webview.getURL() || activeTab.url,
                            isLoading: false
                        });
                        setAddressBarValue(webview.getURL());
                    } catch (error) {
                        console.error(error);
                    }
                };

                const handleDomReady = () => updateNavigationState();
                const handleDidNavigate = (e) => updateNavigationState();
                const handleDidNavigateInPage = (e) => updateNavigationState();

                webview.addEventListener('dom-ready', handleDomReady);
                webview.addEventListener('did-navigate', handleDidNavigate);
                webview.addEventListener('did-navigate-in-page', handleDidNavigateInPage);

                return () => {
                    webview.removeEventListener('dom-ready', handleDomReady);
                    webview.removeEventListener('did-navigate', handleDidNavigate);
                    webview.removeEventListener('did-navigate-in-page', handleDidNavigateInPage);
                };
            }, [webview, activeTabId]); // 依赖项

            // === 3. 辅助函数 ===

            const addTab = () => {
                const newId = `tab-${Date.now()}`;
                const newTab = { id: newId, title: 'New Tab', url: '', isLoading: false, history: [''], historyIndex: 0, canGoBack: false, canGoForward: false };
                setTabs([...tabs, newTab]);
                setActiveTabId(newId);
            };

            const closeTab = (e, tabId) => {
                e.stopPropagation();
                if (tabs.length === 1) return;
                const newTabs = tabs.filter(t => t.id !== tabId);
                setTabs(newTabs);
                if (activeTabId === tabId) setActiveTabId(newTabs[newTabs.length - 1].id);
            };

            const updateTab = (id, updates) => {
                setTabs(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t));
            };

            const navigate = async (url) => {
                let targetUrl = url;
                if (!url || url.trim().length === 0) {
                    updateTab(activeTabId, { url: '', title: 'New Tab', isLoading: false });
                    setAddressBarValue('');
                    return;
                }
                if (!url.startsWith('http')) {
                    const searchQuery = encodeURIComponent(url);
                    targetUrl = searchEngine === 'bing' ? `https://www.bing.com/search?q=${searchQuery}` :
                        searchEngine === 'duckduckgo' ? `https://duckduckgo.com/?q=${searchQuery}` :
                            `https://www.google.com/search?q=${searchQuery}`;
                }
                updateTab(activeTabId, { url: targetUrl, title: targetUrl, isLoading: true });
                setAddressBarValue(targetUrl);
            };

            const goBack = () => webview?.canGoBack() && webview.goBack();
            const goForward = () => webview?.canGoForward() && webview.goForward();
            const reload = () => webview?.reload();
            const goHome = () => navigate('');
            const handleAddressBarSubmit = (e) => { e.preventDefault(); navigate(addressBarValue); };

            // === Auto-Capture Logic for Smart Notes ===
            const handleWebviewMount = (el) => {
                if (!el) return;

                // PREVENT DUPLICATE LISTENERS
                if (el.dataset.notesListenerAttached) return;
                el.dataset.notesListenerAttached = 'true';

                // Attach dom-ready listener
                const onDomReady = () => {
                    try {
                        // Inject script to capture copy events
                        el.executeJavaScript(`
                            document.addEventListener('copy', () => {
                                const selection = document.getSelection().toString();
                                if (selection) {
                                    console.log('ANECHOIC_COPY_EVENT::' + selection);
                                }
                            });
                        `);
                    } catch (err) {
                        console.error("Injection failed", err);
                    }
                };

                // Check if already ready or existing listener? 
                // Simplest is just add listener.
                el.addEventListener('dom-ready', onDomReady);

                // Listen for console messages
                el.addEventListener('console-message', (e) => {
                    if (e.message && e.message.startsWith('ANECHOIC_COPY_EVENT::')) {
                        const text = e.message.replace('ANECHOIC_COPY_EVENT::', '');
                        const url = el.getURL();

                        // Save via IPC
                        if (window.electronAPI && window.electronAPI.invoke) {
                            window.electronAPI.invoke('notes:add', { content: text, sourceUrl: url })
                                .then(result => {
                                    if (result && result.ok && result.added) {
                                        showToast('Smart Note Saved!', 'success');
                                    }
                                });
                        }
                    }
                });
            };

            // === 4. Render (渲染) ===
            const currentThemeColor = themeSettings[mode];
            const mainContainerClass = isCustomTheme ? '' : `${mode === 'learning' ? 'bg-gradient-to-br from-blue-200 via-slate-200 to-indigo-200' : 'bg-gradient-to-br from-orange-200 via-amber-100 to-rose-200'}`;
            const mainContainerStyle = isCustomTheme ? {
                backgroundImage: `linear-gradient(135deg, ${hexToRgba(currentThemeColor, 0.2)} 0%, ${hexToRgba(currentThemeColor, 0.05)} 50%, ${hexToRgba(currentThemeColor, 0.15)} 100%)`
            } : {};

            return (
                <div
                    className={`flex h-screen w-screen overflow-hidden transition-colors duration-500 ${mainContainerClass}`}
                    style={mainContainerStyle}
                >
                    {/* Left Sidebar */}
                    <div className={`transition-all duration-500 ease-in-out ${sidebarOpen ? 'w-64' : 'w-16'}`}>
                        <Sidebar
                            isOpen={sidebarOpen}
                            toggle={() => handleSidebarToggle(!sidebarOpen)}
                            mode={mode}
                            setMode={setMode}
                            onOpenModule={(module) => {
                                if (module === 'chatroom' && window.electronAPI) {
                                    window.electronAPI.openChatroom();
                                } else {
                                    setActiveModule(module);
                                }
                            }}
                            isCustomTheme={isCustomTheme}
                            themeColor={currentThemeColor}
                            language={language}
                        />
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col min-w-0 relative overflow-hidden">
                        {/* Tabs Bar */}
                        <div
                            className={`h-10 flex items-center px-4 select-none draggable transition-colors duration-500 ${isCustomTheme ? '' : mode === 'learning' ? 'bg-slate-200/50' : 'bg-orange-100/50'}`}
                            style={isCustomTheme ? { backgroundColor: hexToRgba(currentThemeColor, 0.1) } : {}}
                        >
                            <div className="flex-1 flex gap-2 overflow-x-auto no-scrollbar items-end h-full pt-1">
                                {tabs.map(tab => (
                                    <div key={tab.id} onClick={() => setActiveTabId(tab.id)} className={`group relative flex items-center gap-2 px-3 py-1.5 rounded-t-lg min-w-[120px] max-w-[200px] text-xs font-medium cursor-pointer transition-all ${activeTabId === tab.id ? 'bg-white shadow-sm text-gray-800' : 'bg-transparent text-gray-500 hover:bg-white/40'}`}>
                                        <span className="truncate flex-1">{tab.title}</span>
                                        <button onClick={(e) => closeTab(e, tab.id)} className="opacity-0 group-hover:opacity-100 hover:bg-gray-200 rounded p-0.5"><Icons.X className="w-3 h-3" /></button>
                                    </div>
                                ))}
                                <button onClick={addTab} className="p-1.5 hover:bg-gray-200/50 rounded-md text-gray-500"><Icons.Plus className="w-4 h-4" /></button>
                            </div>
                        </div>

                        {/* Navigation Bar */}
                        <div className="h-14 px-4 flex items-center gap-3 bg-white/70 backdrop-blur-md border-b border-gray-200/50 z-20">
                            <button onClick={goBack} disabled={!canGoBack} className="p-2 hover:bg-gray-200/50 rounded-lg text-gray-600 disabled:opacity-30 transition-opacity"><Icons.ChevronLeft className="w-5 h-5" /></button>
                            <button onClick={goForward} disabled={!canGoForward} className="p-2 hover:bg-gray-200/50 rounded-lg text-gray-600 disabled:opacity-30 transition-opacity"><Icons.ChevronRight className="w-5 h-5" /></button>
                            <button onClick={goHome} className="p-2 hover:bg-gray-200/50 rounded-lg text-gray-600"><Icons.Home className="w-4 h-4" /></button>
                            <button onClick={reload} className="p-2 hover:bg-gray-200/50 rounded-lg text-gray-600"><Icons.RotateCw className="w-4 h-4" /></button>

                            {/* 书签按钮 (已更新) */}
                            <button
                                onClick={toggleBookmark}
                                title={isBookmarked ? "取消收藏" : "添加到收藏夹"}
                                className={`p-2 rounded-lg transition-all duration-200 ${isBookmarked
                                    ? 'bg-green-100 text-green-600 shadow-sm'
                                    : 'text-gray-600 hover:bg-gray-100'
                                    }`}
                            >
                                <Icons.Bookmark className={`w-5 h-5 ${isBookmarked ? 'fill-current' : ''}`} />
                            </button>

                            <form onSubmit={handleAddressBarSubmit} className="flex-1">
                                <div className="relative group">
                                    <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                                        {activeTab.url.startsWith('https') ? <Icons.Globe className="w-4 h-4 text-green-600" /> : <Icons.Search className="w-4 h-4 text-gray-400" />}
                                    </div>
                                    <input type="text" value={addressBarValue} onChange={(e) => setAddressBarValue(e.target.value)} placeholder={t('Search or enter website...', language)} className="w-full py-2 pl-10 pr-4 bg-gray-100/50 hover:bg-gray-100 focus:bg-white border border-transparent focus:border-blue-300 rounded-lg text-sm transition-all focus:ring-2 focus:ring-blue-100 focus:outline-none" />
                                </div>
                            </form>

                            <div className="relative">
                                <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded-lg transition-colors ${showSettings ? 'bg-gray-200 text-blue-600' : 'hover:bg-gray-200/50 text-gray-600'}`}>
                                    <Icons.Menu className="w-5 h-5" />
                                </button>
                                {showSettings && <SettingsMenu
                                    onClose={() => setShowSettings(false)}
                                    currentEngine={searchEngine}
                                    setEngine={setSearchEngine}
                                    user={user}
                                    onLogin={handleLogin}
                                    onLogout={handleLogout}
                                    themeSettings={themeSettings}
                                    handleThemeChange={handleThemeChange}
                                    resetTheme={resetTheme}
                                    onClearAllUserData={handleClearAllUserData}
                                    onOpenModule={setActiveModule}
                                    addTab={addTab}
                                    language={language}
                                    setLanguage={handleLanguageChange}
                                />}
                            </div>
                        </div>

                        {/* Browser Viewport */}
                        <div className="flex-1 relative bg-white overflow-hidden">
                            {tabs.map(tab => (
                                <div key={tab.id} className={`w-full h-full ${activeTabId === tab.id ? 'block' : 'hidden'}`}>
                                    {!tab.url ? (
                                        <HomeView
                                            onNavigate={(url) => navigate(url)}
                                            onOpenModule={(module) => setActiveModule(module)} language={language}
                                            shortcuts={shortcuts}
                                            onAddShortcut={addShortcut}
                                            onRemoveShortcut={removeShortcut}
                                        />
                                    ) : (
                                        <webview ref={(el) => { if (el) { webviewRefs.current[tab.id] = el; handleWebviewMount(el); } }} src={tab.url} className="w-full h-full" />
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* === 虛假登入/註冊視窗 (Fake Auth Modal) === */}
                        {showLoginModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in">
                                <div className="w-80 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col border border-white/50 p-6 animate-slide-up">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-bold text-gray-800">
                                            {isLoginMode ? t('Login', language) : t('Sign Up', language)}
                                        </h2>
                                        <button onClick={() => setShowLoginModal(false)} className="p-1.5 hover:bg-gray-200 rounded-full transition-colors">
                                            <Icons.X className="w-4 h-4 text-gray-500" />
                                        </button>
                                    </div>
                                    <form onSubmit={submitFakeAuth} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">{t('Username', language)}</label>
                                            <input
                                                type="text"
                                                value={authForm.username}
                                                onChange={e => setAuthForm({ ...authForm, username: e.target.value })}
                                                placeholder={t('Enter username', language)}
                                                className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">{t('Password', language)}</label>
                                            <input
                                                type="password"
                                                value={authForm.password}
                                                onChange={e => setAuthForm({ ...authForm, password: e.target.value })}
                                                placeholder={t('Enter password', language)}
                                                className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                required
                                            />
                                        </div>

                                        {!isLoginMode && (
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">{t('Confirm Password', language)}</label>
                                                <input
                                                    type="password"
                                                    value={authForm.confirmPassword}
                                                    onChange={e => setAuthForm({ ...authForm, confirmPassword: e.target.value })}
                                                    placeholder={t('Re-enter password', language)}
                                                    className="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    required
                                                />
                                            </div>
                                        )}

                                        <button type="submit" className="w-full py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors mt-4 shadow-md shadow-blue-500/30">
                                            {isLoginMode ? t('Confirm Login', language) : t('Register Account', language)}
                                        </button>
                                    </form>

                                    <div className="mt-5 text-center text-sm text-gray-600">
                                        {isLoginMode ? t("Don't have an account? ", language) : t("Already have an account? ", language)}
                                        <button
                                            type="button"
                                            onClick={() => {
                                                setIsLoginMode(!isLoginMode);
                                                setAuthForm({ username: '', password: '', confirmPassword: '' });
                                            }}
                                            className="text-blue-600 hover:text-blue-700 hover:underline font-semibold"
                                        >
                                            {isLoginMode ? t('Register Now', language) : t('Back to Login', language)}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}


                        {/* Modules Overlay */}
                        <AIAssistantModule isOpen={activeModule === 'ai-assistant'} onClose={() => setActiveModule(null)} language={language} />
                        <ChatRoomModule isOpen={activeModule === 'chatroom'} onClose={() => setActiveModule(null)} language={language} />
                        <SmartNotesModule isOpen={activeModule === 'notes'} onClose={() => setActiveModule(null)} onNavigate={(url) => { navigate(url); setActiveModule(null); }} language={language} />
                        <HistoryModule isOpen={activeModule === 'history'} onClose={() => setActiveModule(null)} tabs={tabs} onNavigate={(url) => { navigate(url); setActiveModule(null); }} language={language} />
                        <BookmarksModule isOpen={activeModule === 'bookmarks'} onClose={() => setActiveModule(null)} onNavigate={(url) => { navigate(url); setActiveModule(null); }} language={language} />
                        <PomodoroModule isOpen={activeModule === 'pomodoro'} onClose={() => setActiveModule(null)} language={language} />
                        <TodoListModule isOpen={activeModule === 'todo'} onClose={() => setActiveModule(null)} language={language} />
                        <ScheduleModule isOpen={activeModule === 'schedule'} onClose={() => setActiveModule(null)} language={language} />
                        <WeatherModule isOpen={activeModule === 'weather'} onClose={() => setActiveModule(null)} language={language} />
                        <MuteModeModule isOpen={activeModule === 'mute'} onClose={() => setActiveModule(null)} language={language} />
                    </div>
                </div>
            );

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
